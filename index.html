*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html{height:100%;overflow:hidden;-webkit-text-size-adjust:100%}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,textarea{font-family:inherit;color:inherit}
:root{
  --bg:#000;--bg2:#0E0E0E;--bg3:#1A1A1A;

  --border:rgba(255,255,255,.06);
  --green:#4ADE80;--red:#FF4D4D;--blue:#3B82F6;--orange:#FF8C00;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);--nav:64px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.4;position:fixed;width:100%;height:100%;overflow:hidden}
#app{position:fixed;top:0;left:0;right:0;bottom:var(--nav);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:var(--safe-b)}
#app::-webkit-scrollbar{display:none}
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:rgba(0,0,0,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding-bottom:var(--safe-b);z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 16px;color:var(--text3);transition:color .15s}
.nav-btn span{font-size:10px;font-weight:600;letter-spacing:.3px}
.nav-btn.active{color:var(--accent)}
.nav-btn:active{opacity:.7}
.view{padding:20px;padding-top:calc(var(--safe-t) + 16px);min-height:100%;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.t-xs{font-size:11px}.t-sm{font-size:13px}.t-md{font-size:15px}.t-lg{font-size:18px}.t-xl{font-size:22px}.t-2xl{font-size:28px}.t-3xl{font-size:36px}
.t-muted{color:var(--text2)}.t-faint{color:var(--text3)}.t-accent{color:var(--accent)}
.fw-5{font-weight:500}.fw-6{font-weight:600}.fw-7{font-weight:700}.fw-8{font-weight:800}.fw-9{font-weight:900}
.tabular{font-variant-numeric:tabular-nums}
.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}.mb-32{margin-bottom:32px}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.row{display:flex;align-items:center;gap:12px}
.row-between{display:flex;align-items:center;justify-content:space-between}
.label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px}
.pill{display:inline-flex;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
.pill-accent{background:var(--accent-dim);color:var(--accent)}

.btn{padding:14px 24px;border-radius:12px;font-size:15px;font-weight:700;text-align:center;width:100%;transition:opacity .15s}
.btn-accent{background:var(--accent);color:#000}
.btn:active{opacity:.8}
.input{background:var(--bg3);border:none;border-radius:8px;padding:10px;color:var(--text);font-size:14px;font-weight:600;text-align:center;width:100%;outline:none;font-variant-numeric:tabular-nums}
.input::placeholder{color:var(--text3);font-weight:400}
.input:focus{box-shadow:0 0 0 1px var(--accent)}
.textarea{background:var(--bg2);border:none;border-radius:10px;padding:12px;color:var(--text);font-size:14px;width:100%;resize:none;outline:none;min-height:48px}
.textarea::placeholder{color:var(--text3)}
.ex-row{padding:14px 0;border-bottom:1px solid var(--border)}

.ex-check{width:28px;height:28px;min-width:28px;border-radius:50%;border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;transition:all .15s}
.ex-check.done{background:var(--accent);border-color:var(--accent)}
.ex-check svg{opacity:0;transition:opacity .15s}
.ex-check.done svg{opacity:1}
.set-grid{display:grid;grid-template-columns:32px 1fr 1fr 1fr 36px;gap:6px;align-items:center;margin-top:10px;padding-left:40px}
.set-grid-header{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;text-align:center}
.tabs{display:flex;gap:4px;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:20px}
.tab{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;text-align:center;color:var(--text3);transition:all .15s}
.tab.active{background:var(--accent);color:#000}
.metric{padding:14px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.metric:last-child{border-bottom:none}
.prog{width:100%;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s ease}
.card{background:var(--bg2);border-radius:14px;padding:16px}
.rpe{flex:1;padding:10px 0;background:var(--bg2);border-radius:8px;font-size:14px;font-weight:700;color:var(--text3);text-align:center;cursor:pointer;transition:all .15s}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.loading-h{font-size:56px;font-weight:900;color:var(--accent);animation:pulse 1.5s ease infinite}

  for (let i = ZONES.length - 1; i >= 0; i--) {

  return ZONES[0];

function getPhase(weekNum) {
  return PHASES.find(p => weekNum >= p.weeks[0] && weekNum <= p.weeks[1]) || PHASES[0];

function isDeloadWeek(weekNum) {
  // Deload every 4th week: weeks 4, 8, 12, 16, 20, 24, 28
  if (weekNum <= 30) return weekNum % 4 === 0;
  return false;
}

// ===== MASTER PLAN GENERATOR =====
function generateTrainingPlan() {
  const plan = [];
  const startDate = new Date('2026-04-06');

  for (let week = 1; week <= 34; week++) {
    const phase = getPhase(week);
    const deload = isDeloadWeek(week);

    let weekDays;
    if (week <= 8) weekDays = getBaseWeek(week, deload);
    else if (week <= 16) weekDays = getBuildWeek(week, deload);
    else if (week <= 24) weekDays = getRaceWeek(week, deload);
    else if (week <= 30) weekDays = getPeakWeek(week, deload);
    else weekDays = getTaperWeek(week);

    const weekStartDate = new Date(startDate);
    weekStartDate.setDate(weekStartDate.getDate() + (week - 1) * 7);

    plan.push({
      week, phase, deload,
      startDate: new Date(weekStartDate),
      days: weekDays.map((day, i) => {
        const dayDate = new Date(weekStartDate);
        dayDate.setDate(dayDate.getDate() + i);
        return { ...day, date: dayDate, dateStr: dayDate.toISOString().split('T')[0], weekNum: week, dayIndex: i };
      })
    });
  }
  return plan;
}

// =============================================
// LOCAL STORAGE WRAPPER
// =============================================

const STORAGE_KEY = 'hyrox_app_data';

const Storage = {
  _data: null,
  
  _load() {
    if (this._data) return this._data;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      this._data = raw ? JSON.parse(raw) : this._defaults();
    } catch (e) {
      this._data = this._defaults();
    }
    return this._data;
  },
  
  _save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(this._data));
    } catch (e) {
      console.warn('Storage save failed:', e);
    }
  },
  
  _defaults() {
    return {
      completedWorkouts: {},  // { '2025-04-07': { completed: true, exercises: [...], rpe: 7, notes: '' } }
      vo2maxUpdates: [],      // Additional VO2 max entries user adds
      weightUpdates: [],      // Weight tracking
      lastView: 'dashboard',
      preferences: {
        notifications: true
      }
    };
  },
  
  // Workout completion
  getWorkout(dateStr) {
    const data = this._load();
    return data.completedWorkouts[dateStr] || null;
  },
  
  saveWorkout(dateStr, workoutData) {
    const data = this._load();
    data.completedWorkouts[dateStr] = {
      completed: true,
      timestamp: new Date().toISOString(),
      ...workoutData
    };
    this._save();
  },
  
  toggleExercise(dateStr, exerciseIndex) {
    const data = this._load();
    if (!data.completedWorkouts[dateStr]) {
      data.completedWorkouts[dateStr] = { completed: false, exercises: {} };
    }
    const workout = data.completedWorkouts[dateStr];
    if (!workout.exercises) workout.exercises = {};
    workout.exercises[exerciseIndex] = !workout.exercises[exerciseIndex];
    
    this._save();
    return workout.exercises[exerciseIndex];
  },
  
  isExerciseComplete(dateStr, exerciseIndex) {
    const data = this._load();
    const workout = data.completedWorkouts[dateStr];
    return workout?.exercises?.[exerciseIndex] || false;
  },
  
  markWorkoutComplete(dateStr, rpe, notes) {
    const data = this._load();
    if (!data.completedWorkouts[dateStr]) {
      data.completedWorkouts[dateStr] = { exercises: {} };
    }
    data.completedWorkouts[dateStr].completed = true;
    data.completedWorkouts[dateStr].rpe = rpe;
    data.completedWorkouts[dateStr].notes = notes;
    data.completedWorkouts[dateStr].timestamp = new Date().toISOString();
    this._save();
  },
  
  isWorkoutComplete(dateStr) {
    const data = this._load();
    return data.completedWorkouts[dateStr]?.completed || false;
  },
  
  // Stats
  getCompletedCount() {
    const data = this._load();
    return Object.values(data.completedWorkouts).filter(w => w.completed).length;
  },
  
  getStreak() {
    const data = this._load();
    const today = new Date();
    let streak = 0;
    let checkDate = new Date(today);
    
    while (true) {
      const dateStr = checkDate.toISOString().split('T')[0];
      const dayOfWeek = checkDate.getDay();
      
      // Skip Sundays (rest day)
      if (dayOfWeek === 0) {
        checkDate.setDate(checkDate.getDate() - 1);
        continue;
      }
      
      if (data.completedWorkouts[dateStr]?.completed) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
      } else {
        // If it's today and not completed yet, check yesterday
        if (dateStr === today.toISOString().split('T')[0]) {
          checkDate.setDate(checkDate.getDate() - 1);
          continue;
        }
        break;
      }
    }
    
    return streak;
  },
  
  // Weekly stats
  getWeeklyCompleted(weekNum) {
    const data = this._load();
    const week = TRAINING_PLAN.find(w => w.week === weekNum);
    if (!week) return { completed: 0, total: 6 };
    
    let completed = 0;
    week.days.forEach(day => {
      if (day.type !== 'rest' && data.completedWorkouts[day.dateStr]?.completed) {
        completed++;
      }
    });
    
    return { completed, total: 6 };
  },
  
  // Preferences
  setLastView(view) {
    const data = this._load();
    data.lastView = view;
    this._save();
  },
  
  getLastView() {
    return this._load().lastView;
  },

  // Exercise logging (weight/reps/sets)
  saveExerciseLog(dateStr, exerciseIndex, logData) {
    const data = this._load();
    if (!data.completedWorkouts[dateStr]) {
      data.completedWorkouts[dateStr] = { completed: false, exercises: {}, logs: {} };
    }
    if (!data.completedWorkouts[dateStr].logs) data.completedWorkouts[dateStr].logs = {};
    data.completedWorkouts[dateStr].logs[exerciseIndex] = logData;
    this._save();
  },

  getExerciseLog(dateStr, exerciseIndex) {
    const data = this._load();
    return data.completedWorkouts[dateStr]?.logs?.[exerciseIndex] || {};
  }
};

const Dates = {
  today() {
    return new Date();
  },
  
  todayStr() {
    return this.today().toISOString().split('T')[0];
  },
  
  formatDate(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  },
  
  formatDateFull(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  },
  
  formatDateShort(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  },
  
  getDayName(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { weekday: 'long' });
  },
  
  getDayNameShort(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { weekday: 'short' });
  },
  
  daysUntil(targetDateStr) {
    const target = new Date(targetDateStr + 'T00:00:00');
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const diff = target - now;
    return Math.ceil(diff / (1000 * 60 * 60 * 24));
  },
  
  weeksUntil(targetDateStr) {
    return Math.ceil(this.daysUntil(targetDateStr) / 7);
  },
  
  getCurrentWeek() {
    const start = new Date('2026-04-06T00:00:00');
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const diff = now - start;
    const weekNum = Math.floor(diff / (1000 * 60 * 60 * 24 * 7)) + 1;
    return Math.max(1, Math.min(34, weekNum));
  },
  
  getTodayWorkout() {
    const todayStr = this.todayStr();
    for (const week of TRAINING_PLAN) {
      for (const day of week.days) {
        if (day.dateStr === todayStr) return day;
      }
    }
    return null;
  },
  
  getWeekWorkouts(weekNum) {
    const week = TRAINING_PLAN.find(w => w.week === weekNum);
    return week ? week.days : [];
  },
  
  isToday(dateStr) {
    return dateStr === this.todayStr();
  },
  
  isPast(dateStr) {
    return dateStr < this.todayStr();
  },
  
  isFuture(dateStr) {
    return dateStr > this.todayStr();
  },
  
  countdownTo(targetDateStr) {
    const days = this.daysUntil(targetDateStr);
    const weeks = Math.floor(days / 7);
    const remainingDays = days % 7;
    const months = Math.floor(days / 30);
    const hours = Math.floor((new Date(targetDateStr + 'T08:00:00') - new Date()) / (1000 * 60 * 60));
    
    return { days, weeks, remainingDays, months, hours: Math.max(0, hours) };
  }
};

const Fmt = {
  // Time formatting
  secondsToTime(totalSeconds) {
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    
    if (hours > 0) {
      return `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }
    return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  },
  
  timeToSeconds(timeStr) {
    const parts = timeStr.split(':').map(Number);
    if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
    if (parts.length === 2) return parts[0] * 60 + parts[1];
    return 0;
  },
  
  // Pace
  paceDisplay(secondsPerKm) {
    const min = Math.floor(secondsPerKm / 60);
    const sec = Math.round(secondsPerKm % 60);
    return `${min}:${String(sec).padStart(2, '0')}/km`;
  },
  
  // Diff display
  timeDiff(seconds) {
    const sign = seconds >= 0 ? '+' : '-';
    const abs = Math.abs(seconds);
    const m = Math.floor(abs / 60);
    const s = abs % 60;
    return `${sign}${m}:${String(s).padStart(2, '0')}`;
  },
  
  // Percentage
  percent(value, total) {
    return Math.round((value / total) * 100);
  },
  
  // Ordinal
  ordinal(n) {
    const s = ['th', 'st', 'nd', 'rd'];
    const v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }
};

// SIMPLE CHARTS (Canvas-based, no dependencies)
// =============================================

const Charts = {
  barChart(canvas, data, options = {}) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    const w = rect.width;
    const h = rect.height;
    const padding = { top: 10, right: 10, bottom: 30, left: 10 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    
    const maxVal = Math.max(...data.map(d => d.value)) * 1.1;
    const barWidth = (chartW / data.length) * 0.7;
    const gap = (chartW / data.length) * 0.3;
    
    data.forEach((d, i) => {
      const x = padding.left + i * (barWidth + gap) + gap / 2;
      const barH = (d.value / maxVal) * chartH;
      const y = padding.top + chartH - barH;
      
      // Bar
      ctx.fillStyle = d.color || '#FFE500';
      ctx.beginPath();
      ctx.roundRect(x, y, barWidth, barH, [4, 4, 0, 0]);
      ctx.fill();
      
      // Label
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '10px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(d.label, x + barWidth / 2, h - 5);
    });
  },
  
  // Dual bar chart (for race comparison)
  dualBarChart(canvas, pairs, options = {}) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    const w = rect.width;
    const h = rect.height;
    const padding = { top: 5, right: 5, bottom: 24, left: 5 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    
    const maxVal = Math.max(...pairs.flatMap(p => [p.val1, p.val2])) * 1.1;
    const groupWidth = chartW / pairs.length;
    const barWidth = groupWidth * 0.35;
    
    pairs.forEach((p, i) => {
      const groupX = padding.left + i * groupWidth;
      
      // Bar 1 (Phoenix)
      const h1 = (p.val1 / maxVal) * chartH;
      ctx.fillStyle = 'rgba(255, 229, 0, 0.5)';
      ctx.beginPath();
      ctx.roundRect(groupX + groupWidth * 0.1, padding.top + chartH - h1, barWidth, h1, [3, 3, 0, 0]);
      ctx.fill();
      
      // Bar 2 (Houston)
      const h2 = (p.val2 / maxVal) * chartH;
      ctx.fillStyle = 'rgba(255, 107, 53, 0.5)';
      ctx.beginPath();
      ctx.roundRect(groupX + groupWidth * 0.1 + barWidth + 2, padding.top + chartH - h2, barWidth, h2, [3, 3, 0, 0]);
      ctx.fill();
      
      // Label
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '9px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.label, groupX + groupWidth / 2, h - 5);
    });
  },
  
  // Line chart (for VO2 max trend)
  lineChart(canvas, points, options = {}) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    const w = rect.width;
    const h = rect.height;
    const padding = { top: 15, right: 15, bottom: 30, left: 35 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    
    const values = points.map(p => p.value);
    const minVal = Math.min(...values) - 2;
    const maxVal = Math.max(...values) + 2;
    const range = maxVal - minVal;
    
    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = padding.top + (i / 4) * chartH;
      ctx.beginPath();
      ctx.moveTo(padding.left, y);
      ctx.lineTo(w - padding.right, y);
      ctx.stroke();
      
      const val = Math.round(maxVal - (i / 4) * range);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '10px Inter, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(val, padding.left - 8, y + 4);
    }
    
    // Line
    const color = options.color || '#FFE500';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();
    
    points.forEach((p, i) => {
      const x = padding.left + (i / (points.length - 1)) * chartW;
      const y = padding.top + ((maxVal - p.value) / range) * chartH;
      
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
    
    // Gradient fill under line
    const gradient = ctx.createLinearGradient(0, padding.top, 0, h - padding.bottom);
    // Convert hex to rgba for gradient
    const hexToRgba = (hex, alpha) => {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    };
    gradient.addColorStop(0, hexToRgba(color, 0.15));
    gradient.addColorStop(1, 'rgba(0,0,0,0)');
    
    ctx.lineTo(padding.left + chartW, padding.top + chartH);
    ctx.lineTo(padding.left, padding.top + chartH);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();
    
    // Points
    points.forEach((p, i) => {
      const x = padding.left + (i / (points.length - 1)) * chartW;
      const y = padding.top + ((maxVal - p.value) / range) * chartH;
      
      ctx.fillStyle = '#0a0a0a';
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, 3.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Date label
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.font = '9px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.label, x, h - 8);
    });
  }
};

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(r=>r.forEach(reg=>reg.unregister()));
        navigator.serviceWorker.register('./sw.js').catch(()=>{});
      }
    }, 400);

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => { this.detailDate = null; this.navigate(btn.dataset.view); });
    });
  },

  navigate(view) {
    this.currentView = view;
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.view === view));
    const app = document.getElementById('app');
    switch(view) {
      case 'today': app.innerHTML = renderToday(this.detailDate); break;
      case 'plan': app.innerHTML = renderCalendar(); break;
      case 'stats': app.innerHTML = renderStats(); requestAnimationFrame(()=>{initDashboardCharts();initRaceCharts()}); break;
    }
    if (!this.detailDate) app.scrollTop = 0;
  },

  showWorkoutForDate(d) { this.detailDate = d; this.navigate('today'); },
  prevDay(d) { const dt=new Date(d+'T00:00:00'); dt.setDate(dt.getDate()-1); this.showWorkoutForDate(dt.toISOString().split('T')[0]); },
  nextDay(d) { const dt=new Date(d+'T00:00:00'); dt.setDate(dt.getDate()+1); this.showWorkoutForDate(dt.toISOString().split('T')[0]); },

  toggleExercise(dateStr, index, el) {
    const done = Storage.toggleExercise(dateStr, index);
    const check = el.querySelector('.ex-check');
    const name = el.querySelector('.t-md');
    check.classList.toggle('done', done);
    check.querySelector('svg').style.opacity = done ? 1 : 0;
    check.querySelector('svg').setAttribute('stroke', done ? '#000' : '#fff');
    if (name) { name.style.textDecoration = done ? 'line-through' : ''; name.style.opacity = done ? '.4' : ''; }
  },

  saveLog(dateStr, index) {
    const w = document.getElementById('log-w-'+index)?.value || '';
    const r = document.getElementById('log-r-'+index)?.value || '';
    const s = document.getElementById('log-s-'+index)?.value || '';
    Storage.saveExerciseLog(dateStr, index, {weight:w, reps:r, sets:s});
  },

  selectRPE(v) {
    this.selectedRPE = v;
    document.querySelectorAll('.rpe').forEach(b => {
      b.classList.toggle('sel', parseInt(b.dataset.rpe) === v);
    });
  },

  completeWorkout(dateStr) {
    const notes = document.getElementById('workout-notes')?.value || '';
    Storage.markWorkoutComplete(dateStr, this.selectedRPE || 0, notes);
    this.selectedRPE = null;
    this.navigate('today');
  },

  calendarPrevWeek() { if(calendarCurrentWeek>1){calendarCurrentWeek--;this.navigate('plan')} },
  calendarNextWeek() { if(calendarCurrentWeek<34){calendarCurrentWeek++;this.navigate('plan')} },
  jumpToWeek(w) { calendarCurrentWeek = w; this.navigate('plan'); },
  setStatsTab(t) { statsTab=t; this.navigate('stats'); }
};

document.addEventListener('DOMContentLoaded', () => App.init());

    </script>
</body>
</html>
