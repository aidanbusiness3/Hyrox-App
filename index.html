<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="description" content="Aidan Nelson's personalized 34-week Hyrox training plan — Dallas November 2025">
    <title>HYROX Training — Aidan Nelson</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
/* =============================================
   HYROX TRAINING APP — Design System
   Dark theme with neon green Hyrox branding
   ============================================= */

:root {
  /* Core Colors */
  --bg-primary: #0a0a0a;
  --bg-secondary: #111111;
  --bg-card: #161616;
  --bg-card-hover: #1c1c1c;
  --bg-elevated: #1a1a1a;
  --bg-input: #1e1e1e;
  
  /* Accent Colors */
  --accent-primary: #39FF14;
  --accent-primary-dim: rgba(57, 255, 20, 0.15);
  --accent-primary-glow: rgba(57, 255, 20, 0.3);
  --accent-secondary: #00D4FF;
  --accent-secondary-dim: rgba(0, 212, 255, 0.15);
  --accent-warning: #FF6B35;
  --accent-danger: #FF3B5C;
  --accent-success: #39FF14;
  --accent-gold: #FFD700;
  
  /* Text */
  --text-primary: #ffffff;
  --text-secondary: rgba(255, 255, 255, 0.65);
  --text-tertiary: rgba(255, 255, 255, 0.4);
  --text-accent: #39FF14;
  
  /* Borders */
  --border-subtle: rgba(255, 255, 255, 0.06);
  --border-default: rgba(255, 255, 255, 0.1);
  --border-accent: rgba(57, 255, 20, 0.3);
  
  /* Glassmorphism */
  --glass-bg: rgba(22, 22, 22, 0.8);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-blur: 20px;
  
  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
  --shadow-glow: 0 0 20px rgba(57, 255, 20, 0.15);
  --shadow-glow-strong: 0 0 40px rgba(57, 255, 20, 0.25);
  
  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  
  /* Radii */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 999px;
  
  /* Typography */
  --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-xs: 11px;
  --font-sm: 13px;
  --font-base: 15px;
  --font-lg: 18px;
  --font-xl: 22px;
  --font-2xl: 28px;
  --font-3xl: 36px;
  --font-4xl: 48px;
  
  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;
  --transition-slow: 400ms cubic-bezier(0.16, 1, 0.3, 1);
  
  /* Safe Areas */
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --nav-height: 72px;
}

/* ============ RESET ============ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

html {
  font-size: 16px;
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: var(--font-family);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100%;
  overflow: hidden;
  position: fixed;
  width: 100%;
}

#app {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: var(--nav-height);
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: var(--safe-bottom);
}

img { max-width: 100%; display: block; }
button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
input, select, textarea { font-family: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

/* Scrollbar */
#app::-webkit-scrollbar { width: 4px; }
#app::-webkit-scrollbar-track { background: transparent; }
#app::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

/* ============ LAYOUT ============ */
.view {
  display: none;
  padding: var(--space-lg);
  padding-top: calc(var(--safe-top) + var(--space-lg));
  min-height: 100%;
}

.view.active {
  display: block;
  animation: viewEnter 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

.section-header {
  margin-bottom: var(--space-lg);
}

.section-title {
  font-size: var(--font-xl);
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: var(--space-xs);
}

.section-subtitle {
  font-size: var(--font-sm);
  color: var(--text-secondary);
}

/* ============ TYPOGRAPHY ============ */
.text-accent { color: var(--accent-primary); }
.text-secondary { color: var(--text-secondary); }
.text-tertiary { color: var(--text-tertiary); }
.text-warning { color: var(--accent-warning); }
.text-danger { color: var(--accent-danger); }

.font-bold { font-weight: 700; }
.font-extrabold { font-weight: 800; }
.font-black { font-weight: 900; }

.text-xs { font-size: var(--font-xs); }
.text-sm { font-size: var(--font-sm); }
.text-base { font-size: var(--font-base); }
.text-lg { font-size: var(--font-lg); }
.text-xl { font-size: var(--font-xl); }
.text-2xl { font-size: var(--font-2xl); }
.text-3xl { font-size: var(--font-3xl); }
.text-4xl { font-size: var(--font-4xl); }

.text-mono {
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.5px;
}

/* ============ LOADING SCREEN ============ */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--bg-primary);
}

.loading-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}

.loading-h {
  font-size: 64px;
  font-weight: 900;
  color: var(--accent-primary);
  text-shadow: 0 0 40px rgba(57, 255, 20, 0.4);
  animation: loadPulse 1.5s ease-in-out infinite;
}

.loading-bar {
  width: 120px;
  height: 3px;
  background: var(--bg-card);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

.loading-bar::after {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 40%;
  background: var(--accent-primary);
  border-radius: 3px;
  animation: loadSlide 1s ease-in-out infinite;
}

.loading-text {
  font-size: var(--font-sm);
  color: var(--text-tertiary);
  letter-spacing: 0.5px;
}

/* =============================================
   COMPONENT STYLES
   ============================================= */

/* ============ BOTTOM NAVIGATION ============ */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--nav-height);
  background: rgba(10, 10, 10, 0.92);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border-top: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}

.nav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 8px 12px;
  border-radius: var(--radius-md);
  transition: all var(--transition-fast);
  color: var(--text-tertiary);
  position: relative;
}

.nav-btn span {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.nav-btn.active {
  color: var(--accent-primary);
}

.nav-btn.active::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 2px;
  background: var(--accent-primary);
  border-radius: 2px;
}

.nav-btn:active {
  transform: scale(0.92);
}

/* ============ CARDS ============ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  transition: all var(--transition-base);
}

.card:hover {
  border-color: var(--border-default);
}

.card-glass {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
}

.card-accent {
  background: var(--bg-card);
  border: 1px solid var(--border-accent);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  box-shadow: var(--shadow-glow);
}

.card-glow {
  position: relative;
  overflow: hidden;
}

.card-glow::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
  opacity: 0.5;
}

/* ============ HERO STAT CARD ============ */
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  text-align: center;
}

.stat-value {
  font-size: var(--font-2xl);
  font-weight: 800;
  color: var(--text-primary);
  line-height: 1.1;
  margin-bottom: 2px;
  font-variant-numeric: tabular-nums;
}

.stat-label {
  font-size: var(--font-xs);
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}

/* ============ BADGES / PILLS ============ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: var(--radius-full);
  font-size: var(--font-xs);
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.badge-green {
  background: rgba(57, 255, 20, 0.12);
  color: var(--accent-primary);
  border: 1px solid rgba(57, 255, 20, 0.2);
}

.badge-blue {
  background: var(--accent-secondary-dim);
  color: var(--accent-secondary);
  border: 1px solid rgba(0, 212, 255, 0.2);
}

.badge-orange {
  background: rgba(255, 107, 53, 0.12);
  color: var(--accent-warning);
  border: 1px solid rgba(255, 107, 53, 0.2);
}

.badge-red {
  background: rgba(255, 59, 92, 0.12);
  color: var(--accent-danger);
  border: 1px solid rgba(255, 59, 92, 0.2);
}

.badge-gold {
  background: rgba(255, 215, 0, 0.12);
  color: var(--accent-gold);
  border: 1px solid rgba(255, 215, 0, 0.2);
}

/* Phase badges */
.phase-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: var(--radius-full);
  font-size: var(--font-xs);
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.phase-base { background: rgba(0, 212, 255, 0.12); color: #00D4FF; border: 1px solid rgba(0, 212, 255, 0.25); }
.phase-build { background: rgba(255, 165, 0, 0.12); color: #FFA500; border: 1px solid rgba(255, 165, 0, 0.25); }
.phase-race { background: rgba(255, 59, 92, 0.12); color: #FF3B5C; border: 1px solid rgba(255, 59, 92, 0.25); }
.phase-peak { background: rgba(57, 255, 20, 0.12); color: #39FF14; border: 1px solid rgba(57, 255, 20, 0.25); }

/* ============ BUTTONS ============ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: var(--radius-full);
  font-size: var(--font-sm);
  font-weight: 700;
  letter-spacing: 0.3px;
  transition: all var(--transition-base);
  cursor: pointer;
  border: none;
}

.btn-primary {
  background: var(--accent-primary);
  color: #000;
  box-shadow: var(--shadow-glow);
}

.btn-primary:hover {
  box-shadow: var(--shadow-glow-strong);
  transform: translateY(-1px);
}

.btn-primary:active {
  transform: translateY(0) scale(0.98);
}

.btn-secondary {
  background: var(--bg-card);
  color: var(--text-primary);
  border: 1px solid var(--border-default);
}

.btn-secondary:hover {
  border-color: var(--border-accent);
  background: var(--bg-card-hover);
}

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  padding: 8px 16px;
}

.btn-ghost:hover {
  color: var(--text-primary);
  background: rgba(255,255,255,0.05);
}

.btn-sm {
  padding: 8px 16px;
  font-size: var(--font-xs);
}

.btn-block {
  width: 100%;
}

/* ============ EXERCISE CARD ============ */
.exercise-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  display: flex;
  align-items: center;
  gap: var(--space-md);
  transition: all var(--transition-base);
  cursor: pointer;
}

.exercise-card:active {
  transform: scale(0.98);
  background: var(--bg-card-hover);
}

.exercise-card.completed {
  border-color: rgba(57, 255, 20, 0.2);
  background: rgba(57, 255, 20, 0.03);
}

.exercise-card.completed .exercise-check {
  background: var(--accent-primary);
  border-color: var(--accent-primary);
}

.exercise-card.completed .exercise-check svg {
  opacity: 1;
}

.exercise-check {
  width: 32px;
  height: 32px;
  min-width: 32px;
  border-radius: 50%;
  border: 2px solid var(--border-default);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}

.exercise-check svg {
  opacity: 0;
  color: #000;
  transition: opacity var(--transition-fast);
}

.exercise-info {
  flex: 1;
  min-width: 0;
}

.exercise-name {
  font-size: var(--font-base);
  font-weight: 700;
  margin-bottom: 2px;
}

.exercise-detail {
  font-size: var(--font-xs);
  color: var(--text-secondary);
}

.exercise-meta {
  text-align: right;
  flex-shrink: 0;
}

.exercise-zone {
  font-size: var(--font-xs);
  font-weight: 700;
  padding: 2px 8px;
  border-radius: var(--radius-full);
}

.zone-1 { background: rgba(0, 150, 255, 0.15); color: #0096FF; }
.zone-2 { background: rgba(0, 212, 255, 0.15); color: #00D4FF; }
.zone-3 { background: rgba(255, 165, 0, 0.15); color: #FFA500; }
.zone-4 { background: rgba(255, 80, 50, 0.15); color: #FF5032; }
.zone-5 { background: rgba(255, 59, 92, 0.15); color: #FF3B5C; }

/* ============ PROGRESS BAR ============ */
.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--bg-input);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-primary), #00FF88);
  border-radius: 3px;
  transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ============ RACE COMPARISON BAR ============ */
.race-bar-container {
  margin-bottom: var(--space-md);
}

.race-bar-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.race-bar-name {
  font-size: var(--font-sm);
  font-weight: 600;
}

.race-bar-time {
  font-size: var(--font-sm);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.race-bar {
  height: 28px;
  border-radius: 6px;
  position: relative;
  overflow: hidden;
}

.race-bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 8px;
}

.race-bar-phoenix {
  background: linear-gradient(90deg, rgba(57, 255, 20, 0.2), rgba(57, 255, 20, 0.4));
  border: 1px solid rgba(57, 255, 20, 0.3);
}

.race-bar-houston {
  background: linear-gradient(90deg, rgba(255, 107, 53, 0.2), rgba(255, 107, 53, 0.4));
  border: 1px solid rgba(255, 107, 53, 0.3);
}

.race-bar-goal {
  background: linear-gradient(90deg, rgba(0, 212, 255, 0.2), rgba(0, 212, 255, 0.4));
  border: 1px solid rgba(0, 212, 255, 0.3);
}

/* ============ COUNTDOWN ============ */
.countdown {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-sm);
  text-align: center;
}

.countdown-item {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: var(--space-md) var(--space-sm);
}

.countdown-value {
  font-size: var(--font-2xl);
  font-weight: 900;
  color: var(--accent-primary);
  line-height: 1;
  margin-bottom: 4px;
  font-variant-numeric: tabular-nums;
}

.countdown-label {
  font-size: 9px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 700;
}

/* ============ CALENDAR ============ */
.calendar-week {
  margin-bottom: var(--space-md);
}

.calendar-week-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-sm);
  padding: 0 var(--space-xs);
}

.calendar-week-title {
  font-size: var(--font-sm);
  font-weight: 700;
}

.calendar-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.calendar-day-header {
  font-size: 9px;
  font-weight: 700;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: center;
  padding-bottom: 6px;
}

.calendar-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  font-size: var(--font-xs);
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-fast);
  position: relative;
  gap: 3px;
  border: 1px solid transparent;
}

.calendar-day:hover {
  background: var(--bg-card-hover);
}

.calendar-day.today {
  border-color: var(--accent-primary);
  background: rgba(57, 255, 20, 0.05);
}

.calendar-day.completed {
  background: rgba(57, 255, 20, 0.08);
}

.calendar-day.rest {
  color: var(--text-tertiary);
}

.calendar-day-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
}

.dot-run { background: var(--accent-secondary); }
.dot-strength { background: var(--accent-warning); }
.dot-hyrox { background: var(--accent-primary); }
.dot-rest { background: var(--text-tertiary); }
.dot-complete { background: var(--accent-primary); }

/* ============ TABS ============ */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-card);
  border-radius: var(--radius-full);
  padding: 4px;
  margin-bottom: var(--space-lg);
}

.tab {
  flex: 1;
  padding: 10px 16px;
  border-radius: var(--radius-full);
  font-size: var(--font-xs);
  font-weight: 700;
  text-align: center;
  color: var(--text-tertiary);
  transition: all var(--transition-fast);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.tab.active {
  background: var(--accent-primary);
  color: #000;
}

.tab:not(.active):hover {
  color: var(--text-secondary);
}

/* ============ METRIC ROW ============ */
.metric-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-md) 0;
  border-bottom: 1px solid var(--border-subtle);
}

.metric-row:last-child {
  border-bottom: none;
}

.metric-label {
  font-size: var(--font-sm);
  color: var(--text-secondary);
}

.metric-value {
  font-size: var(--font-sm);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

/* ============ ZONE TABLE ============ */
.zone-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 4px;
}

.zone-table th {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: left;
  padding: 8px 12px;
}

.zone-table td {
  padding: 10px 12px;
  font-size: var(--font-sm);
  font-weight: 500;
  background: var(--bg-card);
}

.zone-table tr td:first-child {
  border-radius: var(--radius-sm) 0 0 var(--radius-sm);
  font-weight: 700;
}

.zone-table tr td:last-child {
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

/* ============ EMPTY STATE ============ */
.empty-state {
  text-align: center;
  padding: var(--space-2xl) var(--space-lg);
}

.empty-state-icon {
  font-size: 48px;
  margin-bottom: var(--space-md);
}

.empty-state-title {
  font-size: var(--font-lg);
  font-weight: 700;
  margin-bottom: var(--space-sm);
}

.empty-state-text {
  font-size: var(--font-sm);
  color: var(--text-secondary);
  max-width: 280px;
  margin: 0 auto;
}

/* ============ GRID HELPERS ============ */
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
}

.grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: var(--space-md);
}

.grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-sm);
}

.flex-between {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.gap-sm { gap: var(--space-sm); }
.gap-md { gap: var(--space-md); }
.gap-lg { gap: var(--space-lg); }

.mb-sm { margin-bottom: var(--space-sm); }
.mb-md { margin-bottom: var(--space-md); }
.mb-lg { margin-bottom: var(--space-lg); }
.mb-xl { margin-bottom: var(--space-xl); }
.mb-2xl { margin-bottom: var(--space-2xl); }

.mt-md { margin-top: var(--space-md); }
.mt-lg { margin-top: var(--space-lg); }

/* ============ NUTRITION CARD ============ */
.nutrition-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: var(--space-md);
}

.nutrition-card .macro-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
}

.nutrition-card .macro-row + .macro-row {
  border-top: 1px solid var(--border-subtle);
}

.macro-name {
  font-size: var(--font-sm);
  font-weight: 600;
}

.macro-value {
  font-size: var(--font-sm);
  font-weight: 700;
  color: var(--accent-primary);
  font-variant-numeric: tabular-nums;
}

/* ============ WORKOUT TYPE ICONS ============ */
.workout-type-icon {
  width: 40px;
  height: 40px;
  min-width: 40px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.type-run { background: rgba(0, 212, 255, 0.12); }
.type-strength { background: rgba(255, 107, 53, 0.12); }
.type-hyrox { background: rgba(57, 255, 20, 0.12); }
.type-rest { background: rgba(255, 255, 255, 0.05); }
.type-intervals { background: rgba(255, 59, 92, 0.12); }
.type-tempo { background: rgba(255, 165, 0, 0.12); }
.type-long { background: rgba(138, 43, 226, 0.12); }

/* =============================================
   ANIMATIONS
   ============================================= */

@keyframes viewEnter {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes loadPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.05); }
}

@keyframes loadSlide {
  0% { left: -40%; }
  100% { left: 100%; }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes countUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(57, 255, 20, 0.1); }
  50% { box-shadow: 0 0 30px rgba(57, 255, 20, 0.25); }
}

@keyframes barGrow {
  from { width: 0; }
}

@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* Stagger children animation */
.stagger-in > * {
  animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.stagger-in > *:nth-child(1) { animation-delay: 0.05s; }
.stagger-in > *:nth-child(2) { animation-delay: 0.1s; }
.stagger-in > *:nth-child(3) { animation-delay: 0.15s; }
.stagger-in > *:nth-child(4) { animation-delay: 0.2s; }
.stagger-in > *:nth-child(5) { animation-delay: 0.25s; }
.stagger-in > *:nth-child(6) { animation-delay: 0.3s; }
.stagger-in > *:nth-child(7) { animation-delay: 0.35s; }
.stagger-in > *:nth-child(8) { animation-delay: 0.4s; }
.stagger-in > *:nth-child(9) { animation-delay: 0.45s; }
.stagger-in > *:nth-child(10) { animation-delay: 0.5s; }

/* Glow animation for accent cards */
.glow { animation: glowPulse 3s ease-in-out infinite; }

/* Bar grow for race comparison */
.bar-animate { animation: barGrow 1s cubic-bezier(0.16, 1, 0.3, 1) both; }

/* Shimmer for loading states */
.shimmer {
  background: linear-gradient(90deg,
    var(--bg-card) 25%,
    var(--bg-card-hover) 50%,
    var(--bg-card) 75%
  );
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
}

/* Fade class for transitions */
.fade-enter { animation: fadeIn 0.3s ease both; }

/* Scale tap feedback */
.tap-scale {
  transition: transform var(--transition-fast);
}

.tap-scale:active {
  transform: scale(0.96);
}

/* Number change animation */
.number-change {
  animation: countUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

const PHASES = [
  { id: 'base',  name: 'Base Build',     weeks: [1, 10],  color: '#00D4FF', emoji: '🏗️' },
  { id: 'build', name: 'Build',          weeks: [11, 20], color: '#FFA500', emoji: '📈' },
  { id: 'race',  name: 'Race Specific',  weeks: [21, 30], color: '#FF3B5C', emoji: '🎯' },
  { id: 'peak',  name: 'Peak & Taper',   weeks: [31, 34], color: '#39FF14', emoji: '⚡' }
];

function getPhase(weekNum) {
  return PHASES.find(p => weekNum >= p.weeks[0] && weekNum <= p.weeks[1]) || PHASES[0];
}

function isDeloadWeek(weekNum) {
  // Deload every 4th week in base and build phases
  if (weekNum <= 20) return weekNum % 4 === 0;
  // Every 3rd week in race phase
  if (weekNum <= 30) return (weekNum - 20) % 3 === 0;
  return false;
}

// ===== MASTER PLAN GENERATOR =====

function generateTrainingPlan() {
  const plan = [];
  const startDate = new Date('2025-04-07');
  
  for (let week = 1; week <= 34; week++) {
    const phase = getPhase(week);
    const deload = isDeloadWeek(week);
    
    let weekDays;
    if (week <= 10) weekDays = getBaseWeek(week, deload);
    else if (week <= 20) weekDays = getBuildWeek(week, deload);
    else if (week <= 30) weekDays = getRaceWeek(week, deload);
    else weekDays = getPeakWeek(week);
    
    // Calculate dates for each day
    const weekStartDate = new Date(startDate);
    weekStartDate.setDate(weekStartDate.getDate() + (week - 1) * 7);
    
    const weekData = {
      week,
      phase: phase,
      deload,
      startDate: new Date(weekStartDate),
      days: weekDays.map((day, i) => {
        const dayDate = new Date(weekStartDate);
        dayDate.setDate(dayDate.getDate() + i);
        return {
          ...day,
          date: dayDate,
          dateStr: dayDate.toISOString().split('T')[0],
          weekNum: week,
          dayIndex: i
        };
      })
    };
    
    plan.push(weekData);
  }
  
  return plan;
}

const STORAGE_KEY = 'hyrox_app_data';

const Storage = {
  _data: null,
  
  _load() {
    if (this._data) return this._data;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      this._data = raw ? JSON.parse(raw) : this._defaults();
    } catch (e) {
      this._data = this._defaults();
    }
    return this._data;
  },
  
  _save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(this._data));
    } catch (e) {
      console.warn('Storage save failed:', e);
    }
  },
  
  _defaults() {
    return {
      completedWorkouts: {},  // { '2025-04-07': { completed: true, exercises: [...], rpe: 7, notes: '' } }
      vo2maxUpdates: [],      // Additional VO2 max entries user adds
      weightUpdates: [],      // Weight tracking
      lastView: 'dashboard',
      preferences: {
        notifications: true
      }
    };
  },
  
  // Workout completion
  getWorkout(dateStr) {
    const data = this._load();
    return data.completedWorkouts[dateStr] || null;
  },
  
  saveWorkout(dateStr, workoutData) {
    const data = this._load();
    data.completedWorkouts[dateStr] = {
      completed: true,
      timestamp: new Date().toISOString(),
      ...workoutData
    };
    this._save();
  },
  
  toggleExercise(dateStr, exerciseIndex) {
    const data = this._load();
    if (!data.completedWorkouts[dateStr]) {
      data.completedWorkouts[dateStr] = { completed: false, exercises: {} };
    }
    const workout = data.completedWorkouts[dateStr];
    if (!workout.exercises) workout.exercises = {};
    workout.exercises[exerciseIndex] = !workout.exercises[exerciseIndex];
    
    this._save();
    return workout.exercises[exerciseIndex];
  },
  
  isExerciseComplete(dateStr, exerciseIndex) {
    const data = this._load();
    const workout = data.completedWorkouts[dateStr];
    return workout?.exercises?.[exerciseIndex] || false;
  },
  
  markWorkoutComplete(dateStr, rpe, notes) {
    const data = this._load();
    if (!data.completedWorkouts[dateStr]) {
      data.completedWorkouts[dateStr] = { exercises: {} };
    }
    data.completedWorkouts[dateStr].completed = true;
    data.completedWorkouts[dateStr].rpe = rpe;
    data.completedWorkouts[dateStr].notes = notes;
    data.completedWorkouts[dateStr].timestamp = new Date().toISOString();
    this._save();
  },
  
  isWorkoutComplete(dateStr) {
    const data = this._load();
    return data.completedWorkouts[dateStr]?.completed || false;
  },
  
  // Stats
  getCompletedCount() {
    const data = this._load();
    return Object.values(data.completedWorkouts).filter(w => w.completed).length;
  },
  
  getStreak() {
    const data = this._load();
    const today = new Date();
    let streak = 0;
    let checkDate = new Date(today);
    
    while (true) {
      const dateStr = checkDate.toISOString().split('T')[0];
      const dayOfWeek = checkDate.getDay();
      
      // Skip Sundays (rest day)
      if (dayOfWeek === 0) {
        checkDate.setDate(checkDate.getDate() - 1);
        continue;
      }
      
      if (data.completedWorkouts[dateStr]?.completed) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
      } else {
        // If it's today and not completed yet, check yesterday
        if (dateStr === today.toISOString().split('T')[0]) {
          checkDate.setDate(checkDate.getDate() - 1);
          continue;
        }
        break;
      }
    }
    
    return streak;
  },
  
  // Weekly stats
  getWeeklyCompleted(weekNum) {
    const data = this._load();
    const week = TRAINING_PLAN.find(w => w.week === weekNum);
    if (!week) return { completed: 0, total: 6 };
    
    let completed = 0;
    week.days.forEach(day => {
      if (day.type !== 'rest' && data.completedWorkouts[day.dateStr]?.completed) {
        completed++;
      }
    });
    
    return { completed, total: 6 };
  },
  
  // Preferences
  setLastView(view) {
    const data = this._load();
    data.lastView = view;
    this._save();
  },
  
  getLastView() {
    return this._load().lastView;
  }
};

// DATE UTILITIES

const Dates = {
  today() {
    return new Date();
  },
  
  todayStr() {
    return this.today().toISOString().split('T')[0];
  },
  
  formatDate(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  },
  
  formatDateFull(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  },
  
  formatDateShort(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  },
  
  getDayName(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { weekday: 'long' });
  },
  
  getDayNameShort(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { weekday: 'short' });
  },
  
  daysUntil(targetDateStr) {
    const target = new Date(targetDateStr + 'T00:00:00');
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const diff = target - now;
    return Math.ceil(diff / (1000 * 60 * 60 * 24));
  },
  
  weeksUntil(targetDateStr) {
    return Math.ceil(this.daysUntil(targetDateStr) / 7);
  },
  
  getCurrentWeek() {
    const start = new Date('2025-04-07T00:00:00');
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const diff = now - start;
    const weekNum = Math.floor(diff / (1000 * 60 * 60 * 24 * 7)) + 1;
    return Math.max(1, Math.min(34, weekNum));
  },
  
  getTodayWorkout() {
    const todayStr = this.todayStr();
    for (const week of TRAINING_PLAN) {
      for (const day of week.days) {
        if (day.dateStr === todayStr) return day;
      }
    }
    return null;
  },
  
  getWeekWorkouts(weekNum) {
    const week = TRAINING_PLAN.find(w => w.week === weekNum);
    return week ? week.days : [];
  },
  
  isToday(dateStr) {
    return dateStr === this.todayStr();
  },
  
  isPast(dateStr) {
    return dateStr < this.todayStr();
  },
  
  isFuture(dateStr) {
    return dateStr > this.todayStr();
  },
  
  countdownTo(targetDateStr) {
    const days = this.daysUntil(targetDateStr);
    const weeks = Math.floor(days / 7);
    const remainingDays = days % 7;
    const months = Math.floor(days / 30);
    const hours = Math.floor((new Date(targetDateStr + 'T08:00:00') - new Date()) / (1000 * 60 * 60));
    
    return { days, weeks, remainingDays, months, hours: Math.max(0, hours) };
  }
};

// FORMATTERS
// =============================================

const Fmt = {
  // Time formatting
  secondsToTime(totalSeconds) {
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    
    if (hours > 0) {
      return `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }
    return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  },
  
  timeToSeconds(timeStr) {
    const parts = timeStr.split(':').map(Number);
    if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
    if (parts.length === 2) return parts[0] * 60 + parts[1];
    return 0;
  },
  
  // Pace
  paceDisplay(secondsPerKm) {
    const min = Math.floor(secondsPerKm / 60);
    const sec = Math.round(secondsPerKm % 60);
    return `${min}:${String(sec).padStart(2, '0')}/km`;
  },
  
  // Diff display
  timeDiff(seconds) {
    const sign = seconds >= 0 ? '+' : '-';
    const abs = Math.abs(seconds);
    const m = Math.floor(abs / 60);
    const s = abs % 60;
    return `${sign}${m}:${String(s).padStart(2, '0')}`;
  },
  
  // Percentage
  percent(value, total) {
    return Math.round((value / total) * 100);
  },
  
  // Ordinal
  ordinal(n) {
    const s = ['th', 'st', 'nd', 'rd'];
    const v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }
};

// =============================================
// SIMPLE CHARTS (Canvas-based, no dependencies)
// =============================================

const Charts = {
  barChart(canvas, data, options = {}) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    const w = rect.width;
    const h = rect.height;
    const padding = { top: 10, right: 10, bottom: 30, left: 10 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    
    const maxVal = Math.max(...data.map(d => d.value)) * 1.1;
    const barWidth = (chartW / data.length) * 0.7;
    const gap = (chartW / data.length) * 0.3;
    
    data.forEach((d, i) => {
      const x = padding.left + i * (barWidth + gap) + gap / 2;
      const barH = (d.value / maxVal) * chartH;
      const y = padding.top + chartH - barH;
      
      // Bar
      ctx.fillStyle = d.color || '#39FF14';
      ctx.beginPath();
      ctx.roundRect(x, y, barWidth, barH, [4, 4, 0, 0]);
      ctx.fill();
      
      // Label
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '10px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(d.label, x + barWidth / 2, h - 5);
    });
  },
  
  // Dual bar chart (for race comparison)
  dualBarChart(canvas, pairs, options = {}) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    const w = rect.width;
    const h = rect.height;
    const padding = { top: 5, right: 5, bottom: 24, left: 5 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    
    const maxVal = Math.max(...pairs.flatMap(p => [p.val1, p.val2])) * 1.1;
    const groupWidth = chartW / pairs.length;
    const barWidth = groupWidth * 0.35;
    
    pairs.forEach((p, i) => {
      const groupX = padding.left + i * groupWidth;
      
      // Bar 1 (Phoenix)
      const h1 = (p.val1 / maxVal) * chartH;
      ctx.fillStyle = 'rgba(57, 255, 20, 0.5)';
      ctx.beginPath();
      ctx.roundRect(groupX + groupWidth * 0.1, padding.top + chartH - h1, barWidth, h1, [3, 3, 0, 0]);
      ctx.fill();
      
      // Bar 2 (Houston)
      const h2 = (p.val2 / maxVal) * chartH;
      ctx.fillStyle = 'rgba(255, 107, 53, 0.5)';
      ctx.beginPath();
      ctx.roundRect(groupX + groupWidth * 0.1 + barWidth + 2, padding.top + chartH - h2, barWidth, h2, [3, 3, 0, 0]);
      ctx.fill();
      
      // Label
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '9px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.label, groupX + groupWidth / 2, h - 5);
    });
  },
  
  // Line chart (for VO2 max trend)
  lineChart(canvas, points, options = {}) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    const w = rect.width;
    const h = rect.height;
    const padding = { top: 15, right: 15, bottom: 30, left: 35 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    
    const values = points.map(p => p.value);
    const minVal = Math.min(...values) - 2;
    const maxVal = Math.max(...values) + 2;
    const range = maxVal - minVal;
    
    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = padding.top + (i / 4) * chartH;
      ctx.beginPath();
      ctx.moveTo(padding.left, y);
      ctx.lineTo(w - padding.right, y);
      ctx.stroke();
      
      const val = Math.round(maxVal - (i / 4) * range);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '10px Inter, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(val, padding.left - 8, y + 4);
    }
    
    // Line
    const color = options.color || '#39FF14';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();
    
    points.forEach((p, i) => {
      const x = padding.left + (i / (points.length - 1)) * chartW;
      const y = padding.top + ((maxVal - p.value) / range) * chartH;
      
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
    
    // Gradient fill under line
    const gradient = ctx.createLinearGradient(0, padding.top, 0, h - padding.bottom);
    // Convert hex to rgba for gradient
    const hexToRgba = (hex, alpha) => {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    };
    gradient.addColorStop(0, hexToRgba(color, 0.15));
    gradient.addColorStop(1, 'rgba(0,0,0,0)');
    
    ctx.lineTo(padding.left + chartW, padding.top + chartH);
    ctx.lineTo(padding.left, padding.top + chartH);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();
    
    // Points
    points.forEach((p, i) => {
      const x = padding.left + (i / (points.length - 1)) * chartW;
      const y = padding.top + ((maxVal - p.value) / range) * chartH;
      
      ctx.fillStyle = '#0a0a0a';
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, 3.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Date label
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.font = '9px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.label, x, h - 8);
    });
  }
};

function renderWeekPreview(weekNum) {
  const days = Dates.getWeekWorkouts(weekNum);
  if (!days.length) return '<p class="text-sm text-tertiary">Plan hasn\'t started yet</p>';
  
  const dayLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  
  return `
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center">
      ${days.map((day, i) => {
        const isToday = Dates.isToday(day.dateStr);
        const isDone = Storage.isWorkoutComplete(day.dateStr);
        const dotClass = day.type === 'rest' ? 'dot-rest' : 
                         day.type === 'run' ? 'dot-run' :
                         day.type === 'hyrox' ? 'dot-hyrox' :
                         day.type === 'strength' ? 'dot-strength' : 'dot-run';
        
        return `
          <div class="calendar-day ${isToday ? 'today' : ''} ${isDone ? 'completed' : ''} ${day.type === 'rest' ? 'rest' : ''}"
               onclick="App.showWorkoutForDate('${day.dateStr}')"
               style="aspect-ratio:auto;padding:8px 4px;border-radius:8px">
            <div style="font-size:10px;color:var(--text-tertiary);margin-bottom:4px">${dayLabels[i]}</div>
            <div style="font-size:16px;margin-bottom:4px">${day.icon}</div>
            ${isDone ? '<div class="calendar-day-dot dot-complete" style="margin:0 auto"></div>' : 
              `<div class="calendar-day-dot ${dotClass}" style="margin:0 auto"></div>`}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function initDashboardCharts() {
  const canvas = document.getElementById('vo2-chart');
  if (!canvas) return;
  
  const points = ATHLETE.vo2maxHistory.map(p => ({
    value: p.value,
    label: Dates.formatDateShort(p.date)
  }));
  
  Charts.lineChart(canvas, points, { color: '#39FF14' });
}

let currentWorkoutDate = null;

function renderWorkout(dateStr) {
  dateStr = dateStr || Dates.todayStr();
  currentWorkoutDate = dateStr;

  let weekNum = 0;
  
  for (const week of TRAINING_PLAN) {
    for (const day of week.days) {
      if (day.dateStr === dateStr) {
        workout = day;
        weekNum = week.week;
        break;
      }
    }
    if (workout) break;
  }
  
  if (!workout) {
    return `
      <div class="view active" id="view-workout">
        <div class="empty-state" style="margin-top:60px">
          <div class="empty-state-icon">📋</div>

      </div>

  const phase = getPhase(weekNum);
  const isComplete = Storage.isWorkoutComplete(dateStr);

  return `

        <div class="stat-card">
          <div class="stat-value" style="font-size:18px">${workout.duration}</div>

        </div>

      <!-- Exercises -->
      <div class="section-header">
        <div class="section-title">Exercises</div>
      </div>
      <div class="stagger-in mb-lg" style="display:flex;flex-direction:column;gap:8px">
        ${workout.exercises.map((ex, i) => {
          const isDone = Storage.isExerciseComplete(dateStr, i);
          return `

      </div>

let calendarCurrentWeek = null;

function renderCalendar() {
  const currentWeek = calendarCurrentWeek || Dates.getCurrentWeek();
  calendarCurrentWeek = currentWeek;
  
  const phase = getPhase(currentWeek);
  const week = TRAINING_PLAN.find(w => w.week === currentWeek);
  
  // Phase summary
  const phaseWeeks = PHASES.map(p => {
    const isActive = currentWeek >= p.weeks[0] && currentWeek <= p.weeks[1];
    const progress = isActive ? Fmt.percent(currentWeek - p.weeks[0] + 1, p.weeks[1] - p.weeks[0] + 1) : 
                     currentWeek > p.weeks[1] ? 100 : 0;
    return { ...p, isActive, progress };
  });
  
  return `
    <div class="view active" id="view-calendar">
      <div class="section-header">
        <h1 class="section-title">Training Plan</h1>
        <div class="section-subtitle">34-Week Periodized Plan → Dallas Nov 22</div>
      </div>
      
      <!-- Phase Timeline -->
      <div class="card mb-lg">
        <div style="display:flex;flex-direction:column;gap:10px">
          ${phaseWeeks.map(p => `
            <div style="display:flex;align-items:center;gap:10px;opacity:${p.isActive ? 1 : p.progress === 100 ? 0.5 : 0.35}">
              <div class="phase-badge phase-${p.id}" style="min-width:120px;font-size:9px;padding:4px 8px;justify-content:center">
                ${p.emoji} ${p.name}
              </div>
              <div style="flex:1">
                <div class="progress-bar" style="height:4px">
                  <div class="progress-fill" style="width:${p.progress}%;${p.isActive ? 'background:' + p.color : ''}"></div>
                </div>
              </div>
              <div class="text-xs text-tertiary" style="min-width:50px;text-align:right">W${p.weeks[0]}-${p.weeks[1]}</div>
            </div>
          `).join('')}
        </div>
      </div>
      
      <!-- Week Navigator -->
      <div class="flex-between mb-md">
        <button class="btn btn-ghost btn-sm" onclick="App.calendarPrevWeek()" ${currentWeek <= 1 ? 'disabled style="opacity:0.3"' : ''}>
          ← Week ${currentWeek - 1}
        </button>
        <div class="text-sm font-bold">
          Week ${currentWeek}
          ${isDeloadWeek(currentWeek) ? ' <span class="badge badge-blue" style="font-size:9px;padding:2px 8px">DELOAD</span>' : ''}
        </div>
        <button class="btn btn-ghost btn-sm" onclick="App.calendarNextWeek()" ${currentWeek >= 34 ? 'disabled style="opacity:0.3"' : ''}>
          Week ${currentWeek + 1} →
        </button>
      </div>
      
      <!-- Week Details -->
      ${week ? `
      <div class="mb-md">
        <div class="flex-between mb-sm">
          <span class="text-xs text-secondary">${Dates.formatDate(week.startDate)} — ${Dates.formatDate(new Date(week.startDate.getTime() + 6 * 24 * 60 * 60 * 1000))}</span>
          <div class="phase-badge phase-${phase.id}" style="font-size:9px;padding:3px 8px">
            ${phase.emoji} ${phase.name}
          </div>
        </div>
      </div>
      
      <div class="stagger-in" style="display:flex;flex-direction:column;gap:8px">
        ${week.days.map(day => {
          const isToday = Dates.isToday(day.dateStr);
          const isDone = Storage.isWorkoutComplete(day.dateStr);
          const isPast = Dates.isPast(day.dateStr) && !isToday;
          
          return `
            <div class="card tap-scale" onclick="App.showWorkoutForDate('${day.dateStr}')" 
                 style="padding:14px 16px;cursor:pointer;${isToday ? 'border-color:var(--border-accent);' : ''}${isDone ? 'border-color:rgba(57,255,20,0.15);background:rgba(57,255,20,0.02);' : ''}${isPast && !isDone ? 'opacity:0.5;' : ''}">
              <div style="display:flex;align-items:center;gap:12px">
                <div class="workout-type-icon type-${day.type}" style="width:36px;height:36px;min-width:36px;font-size:16px">

                <div style="flex:1;min-width:0">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">

                <div style="text-align:right;flex-shrink:0">
                  <div class="text-xs text-tertiary">${day.duration}</div>
                  ${day.zone ? `<span class="exercise-zone zone-${day.zone}" style="font-size:10px;padding:1px 6px;margin-top:4px;display:inline-block">Z${day.zone}</span>` : ''}

function initRaceCharts() {
  // Run pacing chart
  const runChart = document.getElementById('run-pacing-chart');
  if (runChart) {
    const phoenixRuns = RACES[0].stations.filter(s => s.type === 'run');
    const houstonRuns = RACES[1].stations.filter(s => s.type === 'run');
    
    const pairs = phoenixRuns.map((pr, i) => ({
      label: `R${i + 1}`,
      val1: pr.seconds,
      val2: houstonRuns[i].seconds
    }));
    
    Charts.dualBarChart(runChart, pairs);
  }
  
  // Station comparison chart
  const stationChart = document.getElementById('station-compare-chart');
  if (stationChart) {
    const phoenixStations = RACES[0].stations.filter(s => s.type === 'station');
    const houstonStations = RACES[1].stations.filter(s => s.type === 'station');
    
    const pairs = phoenixStations.map((ps, i) => ({
      label: ps.name.substring(0, 4),
      val1: ps.seconds,
      val2: houstonStations[i].seconds
    }));
    
    Charts.dualBarChart(stationChart, pairs);
  }
}

const App = {
  currentView: 'dashboard',
  selectedRPE: null,
  
  init() {
    // Remove loading screen
    setTimeout(() => {
      const loading = document.getElementById('loading-screen');
      if (loading) {
        loading.style.opacity = '0';
        loading.style.transition = 'opacity 0.4s ease';
        setTimeout(() => loading.remove(), 400);
      }
      
      // Show nav
      document.getElementById('bottom-nav').style.display = 'flex';
      
      // Navigate to dashboard
      this.navigate('dashboard');
      
      // Register service worker
      this.registerSW();
    }, 800);
    
    // Nav event listeners
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const view = btn.dataset.view;
        this.navigate(view);
      });
    });
  },
  
  navigate(view) {
    this.currentView = view;
    Storage.setLastView(view);
    
    // Update nav
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === view);
    });
    
    // Render view
    const app = document.getElementById('app');
    
    switch (view) {
      case 'dashboard':
        app.innerHTML = renderDashboard();
        // Init charts after DOM update
        requestAnimationFrame(() => initDashboardCharts());
        break;
      case 'workout':
        app.innerHTML = renderWorkout(currentWorkoutDate);
        break;
      case 'calendar':
        app.innerHTML = renderCalendar();
        break;
      case 'races':
        app.innerHTML = renderRaces();
        requestAnimationFrame(() => initRaceCharts());
        break;
      case 'profile':
        app.innerHTML = renderProfile();
        break;
    }
    
    // Scroll to top
    app.scrollTop = 0;
  },
  
  // Workout actions
  showWorkoutForDate(dateStr) {
    currentWorkoutDate = dateStr;
    this.navigate('workout');
  },
  
  toggleExercise(dateStr, index, el) {
    const isComplete = Storage.toggleExercise(dateStr, index);
    
    if (isComplete) {
      el.classList.add('completed');
    } else {
      el.classList.remove('completed');
    }
  },
  
  selectRPE(value) {
    this.selectedRPE = value;
    document.querySelectorAll('.rpe-btn').forEach(btn => {
      const rpe = parseInt(btn.dataset.rpe);
      if (rpe === value) {
        btn.style.background = 'var(--accent-primary)';
        btn.style.color = '#000';
        btn.style.borderColor = 'var(--accent-primary)';
      } else {
        btn.style.background = '';
        btn.style.color = '';
        btn.style.borderColor = '';
      }
    });
  },
  
  completeWorkout(dateStr) {
    const notes = document.getElementById('workout-notes')?.value || '';
    const rpe = this.selectedRPE || 0;
    
    Storage.markWorkoutComplete(dateStr, rpe, notes);
    this.selectedRPE = null;
    
    // Re-render
    const app = document.getElementById('app');
    app.innerHTML = renderWorkout(dateStr);
    app.scrollTop = 0;
  },
  
  prevDay(dateStr) {
    const date = new Date(dateStr + 'T00:00:00');
    date.setDate(date.getDate() - 1);
    const newDateStr = date.toISOString().split('T')[0];
    this.showWorkoutForDate(newDateStr);
  },
  
  nextDay(dateStr) {
    const date = new Date(dateStr + 'T00:00:00');
    date.setDate(date.getDate() + 1);
    const newDateStr = date.toISOString().split('T')[0];
    this.showWorkoutForDate(newDateStr);
  },
  
  // Calendar
  calendarPrevWeek() {
    if (calendarCurrentWeek > 1) {
      calendarCurrentWeek--;
      this.navigate('calendar');
    }
  },
  
  calendarNextWeek() {
    if (calendarCurrentWeek < 34) {
      calendarCurrentWeek++;
      this.navigate('calendar');
    }
  },
  
  // Races
  setRacesTab(tab) {
    racesTab = tab;
    this.navigate('races');
  },
  
  // Profile
  setProfileTab(tab) {
    profileTab = tab;
    this.navigate('profile');
  },
  
  // PWA
  registerSW() {
    if ('serviceWorker' in navigator) {
      // Clean up any broken service workers from previous deployments
      navigator.serviceWorker.getRegistrations().then(registrations => {
        registrations.forEach(reg => reg.unregister());
      });
      // Also clear old caches
      if ('caches' in window) {
        caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
      }
      // Register sw.js if it exists alongside this file
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(() => {}); // Silently fail if no sw.js — app works fine without it
    }
  }
};

// Start app
document.addEventListener('DOMContentLoaded', () => App.init());

    </script>
</body>
