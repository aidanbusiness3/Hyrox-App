<!DOCTYPE html>
<html lang="en">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#F5EFE6">

    <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html{height:100%;overflow:hidden;-webkit-text-size-adjust:100%}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,textarea{font-family:inherit;color:inherit}
:root{
  --bg:#F5EFE6;--bg2:#EBE4D7;--bg3:#DFD6C4;--surface:#FFFFFF;
  --text:#1E1A16;--text2:rgba(30,26,22,.6);--text3:rgba(30,26,22,.38);
  --accent:#E8552E;--accent-dim:rgba(232,85,46,.1);
  --border:rgba(30,26,22,.08);
  --green:#5B8C5A;--red:#C94B3C;--blue:#4A6FA5;--orange:#E8552E;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);--nav:64px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.4;position:fixed;width:100%;height:100%;overflow:hidden}
#app{position:fixed;top:0;left:0;right:0;bottom:var(--nav);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:var(--safe-b)}
#app::-webkit-scrollbar{display:none}
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:rgba(245,239,230,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding-bottom:var(--safe-b);z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 16px;color:var(--text3);transition:color .15s}
.nav-btn span{font-size:10px;font-weight:600;letter-spacing:.3px}
.nav-btn.active{color:var(--accent)}
.nav-btn:active{opacity:.7}
.view{padding:20px;padding-top:calc(var(--safe-t) + 16px);min-height:100%;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.t-xs{font-size:11px}.t-sm{font-size:13px}.t-md{font-size:15px}.t-lg{font-size:18px}.t-xl{font-size:22px}.t-2xl{font-size:28px}.t-3xl{font-size:36px}
.t-muted{color:var(--text2)}.t-faint{color:var(--text3)}.t-accent{color:var(--accent)}
.fw-5{font-weight:500}.fw-6{font-weight:600}.fw-7{font-weight:700}.fw-8{font-weight:800}.fw-9{font-weight:900}
.tabular{font-variant-numeric:tabular-nums}
.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}.mb-32{margin-bottom:32px}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.row{display:flex;align-items:center;gap:12px}
.row-between{display:flex;align-items:center;justify-content:space-between}
.label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px}
.pill{display:inline-flex;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
.pill-accent{background:var(--accent-dim);color:var(--accent)}
.pill-green{background:rgba(74,222,128,.12);color:var(--green)}
.z1{background:rgba(74,111,165,.14);color:#4A6FA5}.z2{background:rgba(74,111,165,.14);color:#4A6FA5}.z3{background:rgba(232,140,46,.14);color:#C97020}.z4{background:rgba(232,85,46,.14);color:var(--accent)}.z5{background:rgba(201,75,60,.14);color:#A33829}
.btn{padding:14px 24px;border-radius:12px;font-size:15px;font-weight:700;text-align:center;width:100%;transition:opacity .15s}
.btn-accent{background:var(--accent);color:#FFF}
.btn:active{opacity:.8}
.input{background:#FFF;border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:14px;font-weight:600;text-align:center;width:100%;outline:none;font-variant-numeric:tabular-nums}
.input::placeholder{color:var(--text3);font-weight:400}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(232,85,46,.1)}
.textarea{background:#FFF;border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:14px;width:100%;resize:none;outline:none;min-height:48px}
.textarea::placeholder{color:var(--text3)}
.ex-row{padding:14px 0;border-bottom:1px solid var(--border)}
.ex-row:last-child{border-bottom:none}
.ex-check{width:28px;height:28px;min-width:28px;border-radius:50%;border:2px solid rgba(30,26,22,.2);display:flex;align-items:center;justify-content:center;transition:all .15s;background:#FFF}
.ex-check.done{background:var(--accent);border-color:var(--accent)}
.ex-check svg{opacity:0;transition:opacity .15s}
.ex-check.done svg{opacity:1}
.set-grid{display:grid;grid-template-columns:32px 1fr 1fr 1fr 36px;gap:6px;align-items:center;margin-top:10px;padding-left:40px}
.set-grid-header{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;text-align:center}
.tabs{display:flex;gap:4px;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:20px}
.tab{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;text-align:center;color:var(--text2);transition:all .15s}
.tab.active{background:var(--accent);color:#FFF}
.metric{padding:14px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.metric:last-child{border-bottom:none}
.prog{width:100%;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s ease}
.card{background:#FFF;border-radius:14px;padding:16px;border:1px solid var(--border)}
.rpe{flex:1;padding:10px 0;background:#FFF;border:1px solid var(--border);border-radius:8px;font-size:14px;font-weight:700;color:var(--text2);text-align:center;cursor:pointer;transition:all .15s}
.rpe.sel{background:var(--accent);color:#FFF;border-color:var(--accent)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.loading-h{font-size:56px;font-weight:900;color:var(--accent);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.modal-overlay{position:fixed;inset:0;background:rgba(30,26,22,.5);z-index:200;display:flex;align-items:flex-end;animation:fadeIn .2s ease}
.modal{background:var(--bg);width:100%;border-radius:20px 20px 0 0;padding:24px 20px;padding-bottom:calc(20px + var(--safe-b));max-height:80vh;overflow-y:auto}
.modal-day{display:flex;justify-content:space-between;align-items:center;padding:14px 12px;border-radius:10px;cursor:pointer;transition:background .15s}
.modal-day:active{background:var(--bg3)}

/* === MACRO/MEAL TRACKING === */
.pill-muted{background:var(--bg3);color:var(--text2)}
.prog-fill.over{background:var(--red)}
.prog-fill.good{background:var(--green)}
.kcal-big{display:flex;align-items:baseline;gap:8px}
.macro-row{display:grid;grid-template-columns:62px 1fr 86px;gap:10px;align-items:center;padding:6px 0}
.macro-row .macro-label{font-size:12px;font-weight:700;color:var(--text2)}
.macro-row .macro-nums{font-size:12px;font-weight:700;color:var(--text2);text-align:right;font-variant-numeric:tabular-nums}
.meal-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);align-items:center;cursor:pointer}
.meal-row:active{opacity:.7}
.meal-row:last-child{border-bottom:none}
.meal-thumb{width:48px;height:48px;border-radius:8px;background:var(--bg3);object-fit:cover;flex-shrink:0}
.meal-info{flex:1;min-width:0}
.meal-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meal-macros{font-size:11px;color:var(--text2);margin-top:2px;font-variant-numeric:tabular-nums}
.meal-del{padding:6px 10px;border-radius:6px;background:transparent;color:var(--text3);font-size:11px;font-weight:700;flex-shrink:0;border:none;cursor:pointer}
.meal-del:active{background:var(--bg2)}
.capture-preview{width:100%;max-height:240px;border-radius:12px;object-fit:cover;background:var(--bg3);display:block}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.field{margin-bottom:14px}
.field-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block}
.input-text{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;font-weight:600;width:100%;outline:none;text-align:left;font-variant-numeric:tabular-nums}
.input-text:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim)}
.macro-grid-input{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.radio-row{display:flex;gap:6px;background:var(--bg2);border-radius:10px;padding:3px}
.radio-row button{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:700;color:var(--text2);background:transparent;border:none;cursor:pointer}
.radio-row button.sel{background:var(--accent);color:#FFF}
.btn-ghost{background:var(--bg2);color:var(--text);padding:14px 24px;border-radius:12px;font-size:15px;font-weight:700;width:100%}
.btn-ghost:active{opacity:.8}
.card-bg{background:var(--bg2);border-radius:14px}
    </style>
</head>
<body>

function getZoneForHR(hr) {
  for (let i = ZONES.length - 1; i >= 0; i--) {
    if (hr >= ZONES[i].hrMin) return ZONES[i];
  }
  return ZONES[0];
}

function getZoneColor(zone) {
  const z = ZONES.find(z => z.zone === zone);
  return z ? z.color : '#fff';
}

// ===== MASTER PLAN GENERATOR =====
function generateTrainingPlan() {
  const plan = [];
  const startDate = new Date('2026-04-27');

  for (let week = 1; week <= 30; week++) {
    const phase = getPhase(week);
    const deload = isDeloadWeek(week);

    let weekDays;
    if (week <= 10) weekDays = getSpeedFoundationWeek(week, deload);
    else if (week <= 20) weekDays = getRacePaceWeek(week, deload);
    else if (week <= 26) weekDays = getExecutionWeek(week, deload);
    else weekDays = getPeakTaperWeek(week);

    const weekStartDate = new Date(startDate);
    weekStartDate.setDate(weekStartDate.getDate() + (week - 1) * 7);

    plan.push({
      week, phase, deload,
      startDate: new Date(weekStartDate),
      days: weekDays.map((day, i) => {
        const dayDate = new Date(weekStartDate);
        dayDate.setDate(dayDate.getDate() + i);
        return { ...day, date: dayDate, dateStr: dayDate.toISOString().split('T')[0], weekNum: week, dayIndex: i };
      })
    });
  }
  return plan;
}

const STORAGE_KEY = 'hyrox_app_data';

const Storage = {
  _data: null,
  
  _load() {
    if (this._data) return this._data;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      this._data = raw ? JSON.parse(raw) : this._defaults();
    } catch (e) {
      this._data = this._defaults();
    }
    return this._data;
  },
  
  _save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(this._data));
    } catch (e) {
      console.warn('Storage save failed:', e);
    }
  },
  
  _defaults() {
    return {
      completedWorkouts: {},  // { '2025-04-07': { completed: true, exercises: [...], rpe: 7, notes: '' } }
      vo2maxUpdates: [],      // Additional VO2 max entries user adds
      weightUpdates: [],      // Weight tracking (legacy)
      meals: [],              // [{ id, dateStr, loggedAt, name, calories, protein, carbs, fat, thumbnail, source, confidence }]
      weights: [],            // [{ id, dateStr, loggedAt, lbs }]
      fuelGoals: null,        // { calories, protein, carbs, fat, bodyweight, goalType, pace, goalLbs }
      lastView: 'dashboard',
      preferences: {
        notifications: true
      }
    };
  },
  
  // Workout completion
  getWorkout(dateStr) {
    const data = this._load();
    return data.completedWorkouts[dateStr] || null;
  },
  
  saveWorkout(dateStr, workoutData) {
    const data = this._load();
    data.completedWorkouts[dateStr] = {
      completed: true,
      timestamp: new Date().toISOString(),
      ...workoutData
    };
    this._save();
  },
  
  toggleExercise(dateStr, exerciseIndex) {
    const data = this._load();
    if (!data.completedWorkouts[dateStr]) {
      data.completedWorkouts[dateStr] = { completed: false, exercises: {} };
    }
    const workout = data.completedWorkouts[dateStr];
    if (!workout.exercises) workout.exercises = {};
    workout.exercises[exerciseIndex] = !workout.exercises[exerciseIndex];
    
    this._save();
    return workout.exercises[exerciseIndex];
  },
  
  isExerciseComplete(dateStr, exerciseIndex) {
    const data = this._load();
    const workout = data.completedWorkouts[dateStr];
    return workout?.exercises?.[exerciseIndex] || false;
  },
  
  markWorkoutComplete(dateStr, rpe, notes) {
    const data = this._load();
    if (!data.completedWorkouts[dateStr]) {
      data.completedWorkouts[dateStr] = { exercises: {} };
    }
    data.completedWorkouts[dateStr].completed = true;
    data.completedWorkouts[dateStr].rpe = rpe;
    data.completedWorkouts[dateStr].notes = notes;
    data.completedWorkouts[dateStr].timestamp = new Date().toISOString();
    this._save();
  },
  
  isWorkoutComplete(dateStr) {
    const data = this._load();
    return data.completedWorkouts[dateStr]?.completed || false;
  },
  
  // Stats
  getCompletedCount() {
    const data = this._load();
    return Object.values(data.completedWorkouts).filter(w => w.completed).length;
  },
  
  getStreak() {
    const data = this._load();
    const today = new Date();
    let streak = 0;
    let checkDate = new Date(today);
    
    while (true) {
      const dateStr = checkDate.toISOString().split('T')[0];
      const dayOfWeek = checkDate.getDay();
      
      // Skip Sundays (rest day)
      if (dayOfWeek === 0) {
        checkDate.setDate(checkDate.getDate() - 1);
        continue;
      }
      
      if (data.completedWorkouts[dateStr]?.completed) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
      } else {
        // If it's today and not completed yet, check yesterday
        if (dateStr === today.toISOString().split('T')[0]) {
          checkDate.setDate(checkDate.getDate() - 1);
          continue;
        }
        break;
      }
    }
    
    return streak;
  },
  
  // Weekly stats
  getWeeklyCompleted(weekNum) {
    const data = this._load();
    const week = TRAINING_PLAN.find(w => w.week === weekNum);
    if (!week) return { completed: 0, total: 6 };
    
    let completed = 0;
    week.days.forEach(day => {
      if (day.type !== 'rest' && data.completedWorkouts[day.dateStr]?.completed) {
        completed++;
      }
    });
    
    return { completed, total: 6 };
  },
  
  // Preferences
  setLastView(view) {
    const data = this._load();
    data.lastView = view;
    this._save();
  },
  
  getLastView() {
    return this._load().lastView;
  },

  // Exercise logging (weight/reps/sets)
  saveExerciseLog(dateStr, exerciseIndex, logData) {
    const data = this._load();
    if (!data.completedWorkouts[dateStr]) {
      data.completedWorkouts[dateStr] = { completed: false, exercises: {}, logs: {} };
    }
    if (!data.completedWorkouts[dateStr].logs) data.completedWorkouts[dateStr].logs = {};
    data.completedWorkouts[dateStr].logs[exerciseIndex] = logData;
    this._save();
  },

  getExerciseLog(dateStr, exerciseIndex) {
    const data = this._load();
    return data.completedWorkouts[dateStr]?.logs?.[exerciseIndex] || {};
  },

  // Run stats logging
  saveRunStats(dateStr, stats) {
    const data = this._load();
    if (!data.completedWorkouts[dateStr]) {
      data.completedWorkouts[dateStr] = { completed: false, exercises: {}, logs: {} };
    }
    data.completedWorkouts[dateStr].runStats = stats;
    this._save();
  },

  getRunStats(dateStr) {
    const data = this._load();
    return data.completedWorkouts[dateStr]?.runStats || {};
  },

  // Find previous log for same exercise name
  getPreviousLog(currentDateStr, exerciseName) {
    const data = this._load();
    let lastLog = null;
    const dates = Object.keys(data.completedWorkouts).filter(d => d < currentDateStr).sort().reverse();
    for (const d of dates) {
      const w = data.completedWorkouts[d];
      if (!w.logs) continue;
      for (const [idx, log] of Object.entries(w.logs)) {
        // Match by checking if we stored the exercise name
        if (log.exerciseName === exerciseName && (log.weight || log.reps)) return log;
      }
    }
    return null;
  },

  // Day swaps — swap workouts between days
  swapDays(date1, date2) {
    const data = this._load();
    if (!data.swaps) data.swaps = {};
    // Resolve current swaps so we get the original underlying workouts
    const orig1 = data.swaps[date1] || date1;
    const orig2 = data.swaps[date2] || date2;
    // Set new mappings
    if (orig1 === date2) delete data.swaps[date2]; else data.swaps[date2] = orig1;
    if (orig2 === date1) delete data.swaps[date1]; else data.swaps[date1] = orig2;
    this._save();
  },

  getWorkoutDate(dateStr) {
    // Returns the underlying workout date for a given calendar date (handles swaps)
    const data = this._load();
    return (data.swaps && data.swaps[dateStr]) || dateStr;
  },

  resetSwaps() {
    const data = this._load();
    data.swaps = {};
    this._save();
  },

  // Get all run stats for chart (HR over time at easy pace)
  getAllRunStats() {
    const data = this._load();
    const stats = [];
    for (const [dateStr, workout] of Object.entries(data.completedWorkouts)) {
      if (workout.runStats && workout.runStats.avgHR) {
        stats.push({ date: dateStr, ...workout.runStats });
      }
    }
    return stats.sort((a, b) => a.date.localeCompare(b.date));
  },

  // --- meals ---
  addMeal(meal) {
    const data = this._load();
    if (!data.meals) data.meals = [];
    const m = {
      id: 'meal_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      loggedAt: new Date().toISOString(),
      dateStr: localDateStr(new Date()),
      ...meal
    };
    data.meals.unshift(m);
    this._save();
    return m;
  },

  updateMeal(id, patch) {
    const data = this._load();
    if (!data.meals) data.meals = [];
    const m = data.meals.find(x => x.id === id);
    if (m) Object.assign(m, patch);
    this._save();
  },

  deleteMeal(id) {
    const data = this._load();
    if (!data.meals) data.meals = [];
    data.meals = data.meals.filter(x => x.id !== id);
    this._save();
  },

  getMealsForDate(dateStr) {
    const data = this._load();
    return (data.meals || []).filter(m => m.dateStr === dateStr);
  },

  getDailyTotals(dateStr) {
    return this.getMealsForDate(dateStr).reduce((acc, m) => ({
      calories: acc.calories + (Number(m.calories) || 0),
      protein: acc.protein + (Number(m.protein) || 0),
      carbs: acc.carbs + (Number(m.carbs) || 0),
      fat: acc.fat + (Number(m.fat) || 0)
    }), { calories: 0, protein: 0, carbs: 0, fat: 0 });
  },

  // --- fuel goals ---
  getFuelGoals() {
    return this._load().fuelGoals || null;
  },

  setFuelGoals(goals) {
    const data = this._load();
    data.fuelGoals = { ...goals };
    this._save();
  },

  // --- bodyweight tracking ---
  addWeight(lbs, dateStr) {
    const data = this._load();
    if (!data.weights) data.weights = [];
    const ds = dateStr || localDateStr(new Date());
    data.weights = data.weights.filter(w => w.dateStr !== ds); // dedupe per day
    data.weights.push({
      id: 'w_' + Date.now(),
      dateStr: ds,
      loggedAt: new Date().toISOString(),
      lbs: Number(lbs) || 0
    });
    data.weights.sort((a, b) => a.dateStr.localeCompare(b.dateStr));
    this._save();
  },

  deleteWeight(id) {
    const data = this._load();
    if (!data.weights) data.weights = [];
    data.weights = data.weights.filter(w => w.id !== id);
    this._save();
  },

  getWeights() {
    return this._load().weights || [];
  },

  getLatestWeight() {
    const ws = this.getWeights();
    return ws.length ? ws[ws.length - 1] : null;
  },

  getWeightTrend(daysAgo) {
    const ws = this.getWeights();
    if (ws.length < 2) return null;
    const latest = ws[ws.length - 1];
    const cutoffStr = localDateStr(new Date(Date.now() - daysAgo * 86400000));
    let from = null;
    for (const w of ws) {
      if (w.dateStr <= cutoffStr) from = w;
      else break;
    }
    if (!from) from = ws[0];
    if (from.id === latest.id) return null;
    return {
      delta: +(latest.lbs - from.lbs).toFixed(1),
      days: Math.max(1, Math.round((new Date(latest.dateStr) - new Date(from.dateStr)) / 86400000)),
      fromLbs: from.lbs,
      fromDate: from.dateStr
    };
  }
};

const Dates = {
  today() {
    return new Date();
  },
  
  todayStr() {
    return this.today().toISOString().split('T')[0];
  },
  
  formatDate(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  },
  
  formatDateFull(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  },
  
  formatDateShort(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  },
  
  getDayName(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { weekday: 'long' });
  },
  
  getDayNameShort(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { weekday: 'short' });
  },
  
  daysUntil(targetDateStr) {
    const target = new Date(targetDateStr + 'T00:00:00');
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const diff = target - now;
    return Math.ceil(diff / (1000 * 60 * 60 * 24));
  },
  
  weeksUntil(targetDateStr) {
    return Math.ceil(this.daysUntil(targetDateStr) / 7);
  },
  
  getCurrentWeek() {
    const start = new Date('2026-04-27T00:00:00');
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const diff = now - start;
    const weekNum = Math.floor(diff / (1000 * 60 * 60 * 24 * 7)) + 1;
    return Math.max(1, Math.min(30, weekNum));
  },
  
  getTodayWorkout() {
    const todayStr = this.todayStr();
    for (const week of TRAINING_PLAN) {
      for (const day of week.days) {
        if (day.dateStr === todayStr) return day;
      }
    }
    return null;
  },
  
  getWeekWorkouts(weekNum) {
    const week = TRAINING_PLAN.find(w => w.week === weekNum);
    return week ? week.days : [];
  },
  
  isToday(dateStr) {
    return dateStr === this.todayStr();
  },
  
  isPast(dateStr) {
    return dateStr < this.todayStr();
  },
  
  isFuture(dateStr) {
    return dateStr > this.todayStr();
  },
  
  countdownTo(targetDateStr) {
    const days = this.daysUntil(targetDateStr);
    const weeks = Math.floor(days / 7);
    const remainingDays = days % 7;
    const months = Math.floor(days / 30);
    const hours = Math.floor((new Date(targetDateStr + 'T08:00:00') - new Date()) / (1000 * 60 * 60));
    
    return { days, weeks, remainingDays, months, hours: Math.max(0, hours) };
  }
};

const Fmt = {
  // Time formatting
  secondsToTime(totalSeconds) {
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    
    if (hours > 0) {
      return `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }
    return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  },
  
  timeToSeconds(timeStr) {
    const parts = timeStr.split(':').map(Number);
    if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
    if (parts.length === 2) return parts[0] * 60 + parts[1];
    return 0;
  },
  
  // Pace
  paceDisplay(secondsPerKm) {
    const min = Math.floor(secondsPerKm / 60);
    const sec = Math.round(secondsPerKm % 60);
    return `${min}:${String(sec).padStart(2, '0')}/km`;
  },
  
  // Diff display
  timeDiff(seconds) {
    const sign = seconds >= 0 ? '+' : '-';
    const abs = Math.abs(seconds);
    const m = Math.floor(abs / 60);
    const s = abs % 60;
    return `${sign}${m}:${String(s).padStart(2, '0')}`;
  },
  
  // Percentage
  percent(value, total) {
    return Math.round((value / total) * 100);
  },
  
  // Ordinal
  ordinal(n) {
    const s = ['th', 'st', 'nd', 'rd'];
    const v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }
};

function localDateStr(d) {
  const dt = (d instanceof Date) ? d : new Date(d);
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  const day = String(dt.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function todayStr() {
  return localDateStr(new Date());
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}

async function fileToCompressedDataUrl(file, maxDim, quality = 0.85) {
  const url = URL.createObjectURL(file);
  try {
    const img = await new Promise((resolve, reject) => {
      const i = new Image();
      i.onload = () => resolve(i);
      i.onerror = () => reject(new Error('Could not load image'));
      i.src = url;
    });
    let w = img.width, h = img.height;
    if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
    else if (h >= w && h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    return canvas.toDataURL('image/jpeg', quality);
  } finally {
    URL.revokeObjectURL(url);
  }
}

function dataUrlToBase64(dataUrl) {
  return dataUrl.replace(/^data:image\/\w+;base64,/, '');
}

// Suggested calorie/macro targets from bodyweight + goal type + pace (lbs/week)
function suggestGoals(bodyweightLb, goalType, paceLbWeek) {
  const maintenance = Math.round(bodyweightLb * 15);
  let pace = paceLbWeek;
  if (pace == null) pace = goalType === 'gain' ? 0.5 : (goalType === 'cut' ? -0.75 : 0);
  const calories = Math.round(maintenance + (pace * 3500 / 7));
  const protein = Math.round(bodyweightLb * (goalType === 'cut' ? 1.1 : 1.0));
  const fat = Math.max(40, Math.round(calories * 0.25 / 9));
  const carbs = Math.max(0, Math.round((calories - protein * 4 - fat * 9) / 4));
  return { calories, protein, carbs, fat, maintenance, pace };
}

function openOverlay(html) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = html;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.remove();
  });
  return overlay;
}

const Charts = {
  barChart(canvas, data, options = {}) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    const w = rect.width;
    const h = rect.height;
    const padding = { top: 10, right: 10, bottom: 30, left: 10 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    
    const maxVal = Math.max(...data.map(d => d.value)) * 1.1;
    const barWidth = (chartW / data.length) * 0.7;
    const gap = (chartW / data.length) * 0.3;
    
    data.forEach((d, i) => {
      const x = padding.left + i * (barWidth + gap) + gap / 2;
      const barH = (d.value / maxVal) * chartH;
      const y = padding.top + chartH - barH;
      
      // Bar
      ctx.fillStyle = d.color || '#E8552E';
      ctx.beginPath();
      ctx.roundRect(x, y, barWidth, barH, [4, 4, 0, 0]);
      ctx.fill();
      
      // Label
      ctx.fillStyle = 'rgba(30,26,22,0.45)';
      ctx.font = '10px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(d.label, x + barWidth / 2, h - 5);
    });
  },
  
  // Dual bar chart (for race comparison)
  dualBarChart(canvas, pairs, options = {}) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    const w = rect.width;
    const h = rect.height;
    const padding = { top: 5, right: 5, bottom: 24, left: 5 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    
    const maxVal = Math.max(...pairs.flatMap(p => [p.val1, p.val2])) * 1.1;
    const groupWidth = chartW / pairs.length;
    const barWidth = groupWidth * 0.35;
    
    pairs.forEach((p, i) => {
      const groupX = padding.left + i * groupWidth;
      
      // Bar 1 (Phoenix)
      const h1 = (p.val1 / maxVal) * chartH;
      ctx.fillStyle = 'rgba(232, 85, 46, 0.55)';
      ctx.beginPath();
      ctx.roundRect(groupX + groupWidth * 0.1, padding.top + chartH - h1, barWidth, h1, [3, 3, 0, 0]);
      ctx.fill();

      // Bar 2 (Houston)
      const h2 = (p.val2 / maxVal) * chartH;
      ctx.fillStyle = 'rgba(74, 111, 165, 0.5)';
      ctx.beginPath();
      ctx.roundRect(groupX + groupWidth * 0.1 + barWidth + 2, padding.top + chartH - h2, barWidth, h2, [3, 3, 0, 0]);
      ctx.fill();

      // Label
      ctx.fillStyle = 'rgba(30,26,22,0.45)';
      ctx.font = '9px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.label, groupX + groupWidth / 2, h - 5);
    });
  },
  
  // Line chart (for VO2 max trend)
  lineChart(canvas, points, options = {}) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    const w = rect.width;
    const h = rect.height;
    const padding = { top: 15, right: 15, bottom: 30, left: 35 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    
    const values = points.map(p => p.value);
    const minVal = Math.min(...values) - 2;
    const maxVal = Math.max(...values) + 2;
    const range = maxVal - minVal;
    
    // Grid lines
    ctx.strokeStyle = 'rgba(30,26,22,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = padding.top + (i / 4) * chartH;
      ctx.beginPath();
      ctx.moveTo(padding.left, y);
      ctx.lineTo(w - padding.right, y);
      ctx.stroke();
      
      const val = Math.round(maxVal - (i / 4) * range);
      ctx.fillStyle = 'rgba(30,26,22,0.4)';
      ctx.font = '10px Inter, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(val, padding.left - 8, y + 4);
    }
    
    // Line
    const color = options.color || '#E8552E';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();
    
    points.forEach((p, i) => {
      const x = padding.left + (i / (points.length - 1)) * chartW;
      const y = padding.top + ((maxVal - p.value) / range) * chartH;
      
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
    
    // Gradient fill under line
    const gradient = ctx.createLinearGradient(0, padding.top, 0, h - padding.bottom);
    // Convert hex to rgba for gradient
    const hexToRgba = (hex, alpha) => {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    };
    gradient.addColorStop(0, hexToRgba(color, 0.15));
    gradient.addColorStop(1, 'rgba(0,0,0,0)');
    
    ctx.lineTo(padding.left + chartW, padding.top + chartH);
    ctx.lineTo(padding.left, padding.top + chartH);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();
    
    // Points
    points.forEach((p, i) => {
      const x = padding.left + (i / (points.length - 1)) * chartW;
      const y = padding.top + ((maxVal - p.value) / range) * chartH;
      
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, 3.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Date label
      ctx.fillStyle = 'rgba(30,26,22,0.4)';
      ctx.font = '9px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.label, x, h - 8);
    });
  }
};

function renderCalendar() {
  const currentWeek = calendarCurrentWeek || Dates.getCurrentWeek();
  calendarCurrentWeek = currentWeek;
  const phase = getPhase(currentWeek);
  const week = TRAINING_PLAN.find(w => w.week === currentWeek);

  return `<div class="view">
    <div class="t-xl fw-9 mb-4">Plan</div>
    <div class="t-sm t-muted mb-24">30 weeks to Dallas · Nov 21, 2026</div>

    <!-- Phase pills (tappable) -->
    <div class="row mb-24" style="gap:6px;flex-wrap:wrap">
      ${PHASES.map(p => {
        const active = currentWeek >= p.weeks[0] && currentWeek <= p.weeks[1];
        return `<button class="pill ${active ? 'pill-accent' : ''}" style="${!active ? 'opacity:.4' : ''}cursor:pointer" onclick="App.jumpToWeek(${p.weeks[0]})">${p.emoji} ${p.name} (${p.weeks[0]}-${p.weeks[1]})</button>`;
      }).join('')}
    </div>

    <!-- Week nav -->
    <div class="row-between mb-16">
      <button onclick="App.calendarPrevWeek()" style="padding:8px 12px;color:var(--text2);${currentWeek <= 1 ? 'opacity:.2' : ''}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div style="text-align:center">
        <div class="t-lg fw-8">Week ${currentWeek}</div>
        <div class="t-xs t-muted">${phase.emoji} ${phase.name}${isDeloadWeek(currentWeek) ? ' · Deload' : ''}</div>
      </div>
      <button onclick="App.calendarNextWeek()" style="padding:8px 12px;color:var(--text2);${currentWeek >= 30 ? 'opacity:.2' : ''}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    ${week ? `
    <div class="t-xs t-muted mb-16">${Dates.formatDate(week.startDate)} — ${Dates.formatDate(new Date(week.startDate.getTime() + 6*24*60*60*1000))}</div>

    ${week.days.map(day => {
      const today = Dates.isToday(day.dateStr);
      const done = Storage.isWorkoutComplete(day.dateStr);
      const past = Dates.isPast(day.dateStr) && !today;
      // Resolve swap to show the actual workout for this day
      const wDate = Storage.getWorkoutDate(day.dateStr);
      const swapped = wDate !== day.dateStr;
      let displayDay = day;
      if (swapped) {
        for (const w of TRAINING_PLAN) {
          for (const d of w.days) if (d.dateStr === wDate) { displayDay = d; break; }
        }
      }
      return `
        <div onclick="App.showWorkoutForDate('${day.dateStr}')" style="padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;${past && !done ? 'opacity:.4' : ''}">
          <div class="row">
            <div style="width:36px;text-align:center;font-size:18px">${done ? '✅' : displayDay.icon}</div>
            <div style="flex:1">
              <div class="row-between">
                <div>
                  <span class="t-xs t-faint fw-6" style="margin-right:6px">${day.day.substring(0,3).toUpperCase()}</span>
                  <span class="t-xs t-muted">${Dates.formatDate(day.dateStr)}</span>
                  ${today ? '<span class="pill pill-accent" style="margin-left:6px;font-size:9px;padding:1px 6px">TODAY</span>' : ''}
                  ${swapped ? '<span class="pill" style="margin-left:6px;font-size:9px;padding:1px 6px;background:rgba(232,85,46,.12);color:var(--accent)">SWAP</span>' : ''}
                </div>
                <div class="t-xs t-muted">${displayDay.duration}</div>
              </div>
              <div class="t-sm fw-6 mt-4">${displayDay.title}</div>
            </div>
          </div>
        </div>`;
    }).join('')}
    ` : '<div class="t-sm t-muted" style="text-align:center;padding:40px">No plan data</div>'}
  </div>`;
}

function macroRowHtml(label, current, target) {
  const pct = target ? Math.round(current / target * 100) : 0;
  const cls = pct > 110 ? 'over' : (pct >= 90 ? 'good' : '');
  return `
    <div class="macro-row">
      <div class="macro-label">${label}</div>
      <div class="prog"><div class="prog-fill ${cls}" style="width:${Math.min(100, pct)}%"></div></div>
      <div class="macro-nums">${current} / ${target}g</div>
    </div>
  `;
}

function mealRowHtml(m) {
  const time = new Date(m.loggedAt).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  return `
    <div class="meal-row" onclick="editMealById('${m.id}')">
      ${m.thumbnail
        ? `<img class="meal-thumb" src="${m.thumbnail}" alt="">`
        : `<div class="meal-thumb"></div>`}
      <div class="meal-info">
        <div class="meal-name">${escapeHtml(m.name)}</div>
        <div class="meal-macros">${m.calories} kcal · ${m.protein}P · ${m.carbs}C · ${m.fat}F · ${time}</div>
      </div>
      <button class="meal-del" onclick="event.stopPropagation();deleteMealById('${m.id}')">Delete</button>
    </div>
  `;
}

function formatTrend(t) {
  if (!t) return '—';
  const sign = t.delta > 0 ? '+' : (t.delta < 0 ? '' : '±');
  return `${sign}${t.delta.toFixed(1)} lb`;
}

function deleteMealById(id) {
  if (confirm('Delete this meal?')) {
    Storage.deleteMeal(id);
    App.navigate('fuel');
  }
}

function editMealById(id) {
  const meal = Storage.getMealsForDate(todayStr()).find(m => m.id === id);
  if (meal) openMealConfirm(meal.thumbnail || null, meal, true);
}

function handleMealFileChange(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  e.target.value = '';
  handleMealPhoto(file);
}

// ---------- MEAL CAPTURE / CONFIRM ----------
async function handleMealPhoto(file) {
  let dataUrl = null, thumb = null;
  const overlay = openOverlay(`
    <div class="modal">
      <div class="t-xl fw-9 mb-4">Analyzing your meal</div>
      <div class="t-sm t-muted mb-16">Estimating macros from your photo...</div>
      <img id="capPreview" class="capture-preview" style="margin-bottom:16px">
      <div style="display:flex;justify-content:center;padding:16px"><div class="spinner"></div></div>
    </div>
  `);

  try {
    [dataUrl, thumb] = await Promise.all([
      fileToCompressedDataUrl(file, 800, 0.85),
      fileToCompressedDataUrl(file, 200, 0.6)
    ]);
    overlay.querySelector('#capPreview').src = dataUrl;

    const r = await fetch('/api/analyze-meal', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ imageBase64: dataUrlToBase64(dataUrl), mediaType: 'image/jpeg' })
    });
    const result = await r.json();
    overlay.remove();
    if (!r.ok) {
      openMealConfirm(thumb, null, false, result.error || `AI failed (${r.status})`);
    } else {
      openMealConfirm(thumb, { ...result, source: 'ai' });
    }
  } catch (e) {
    overlay.remove();
    openMealConfirm(thumb, null, false, e.message || 'Failed to process image');
  }
}

          : (m.confidence ? `AI estimate · confidence: <span class="t-accent fw-7">${escapeHtml(m.confidence)}</span> · adjust if needed` : 'Enter macros below.')}
      </div>
      ${thumbnail ? `<img class="capture-preview" src="${thumbnail}" style="margin-bottom:16px">` : ''}

      <div class="field">
        <label class="field-label">Meal name</label>
        <input class="input-text" id="f_name" value="${escapeHtml(String(m.name))}" placeholder="What did you eat?">
      </div>

        </div>

        </div>
        <div class="field">
          <label class="field-label">Fat (g)</label>

      <button class="btn btn-ghost" id="cancelMeal">Cancel</button>
    </div>
  `);

  overlay.querySelector('#cancelMeal').addEventListener('click', () => overlay.remove());
  overlay.querySelector('#saveMeal').addEventListener('click', () => {
    const data = {
      name: overlay.querySelector('#f_name').value.trim() || 'Meal',
      calories: parseInt(overlay.querySelector('#f_cal').value, 10) || 0,
      protein: parseInt(overlay.querySelector('#f_p').value, 10) || 0,

    if (isEdit) {

    } else {

        ...data,

        source: m.source || 'manual',
        confidence: m.confidence || null
      });
    }
    overlay.remove();
    App.navigate('fuel');
  });

function openGoalsModal() {
  const existing = Storage.getFuelGoals() || {};
  const latestW = Storage.getLatestWeight();
  const defaultBw = existing.bodyweight || (latestW ? latestW.lbs : 180);
  let goalType = existing.goalType || 'gain';
  let pace = existing.pace != null ? existing.pace : 0.5;

  const overlay = openOverlay(`
    <div class="modal">
      <div class="t-xl fw-9 mb-4">Daily Macro Goals</div>
      <div class="t-sm t-muted mb-16">Targets are estimated from bodyweight + pace. Tap Recalculate after changes, or override any number.</div>

      <div class="field">
        <label class="field-label">Bodyweight (lbs)</label>
        <input class="input-text" id="g_bw" type="number" inputmode="decimal" step="0.1" value="${defaultBw}">
      </div>

      <div class="field">
        <label class="field-label">Goal</label>
        <div class="radio-row" id="g_type">
          <button data-type="gain" class="${goalType === 'gain' ? 'sel' : ''}">Gain</button>
          <button data-type="maintain" class="${goalType === 'maintain' ? 'sel' : ''}">Maintain</button>
          <button data-type="cut" class="${goalType === 'cut' ? 'sel' : ''}">Cut</button>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Pace (lbs / week)</label>
        <input class="input-text" id="g_pace" type="number" inputmode="decimal" step="0.1" value="${pace}">
        <div class="t-xs t-faint mt-4">Positive = gain (try 0.3-0.7), negative = cut (try -0.5 to -1.0)</div>
      </div>

      <div class="field">
        <label class="field-label">Goal Weight (lbs, optional)</label>
        <input class="input-text" id="g_target" type="number" inputmode="decimal" step="0.1" value="${existing.goalLbs || ''}" placeholder="e.g. 195">
      </div>

      <button class="btn btn-ghost mb-16" id="g_recalc">↻ Recalculate Suggested Targets</button>

      <div class="field">
        <label class="field-label">Calories</label>
        <input class="input-text" id="g_cal" type="number" inputmode="numeric" value="${existing.calories || ''}">
      </div>

      <div class="macro-grid-input">
        <div class="field">
          <label class="field-label">Protein (g)</label>
          <input class="input-text" id="g_p" type="number" inputmode="numeric" value="${existing.protein || ''}">
        </div>
        <div class="field">
          <label class="field-label">Carbs (g)</label>
          <input class="input-text" id="g_c" type="number" inputmode="numeric" value="${existing.carbs || ''}">
        </div>
        <div class="field">
          <label class="field-label">Fat (g)</label>
          <input class="input-text" id="g_f" type="number" inputmode="numeric" value="${existing.fat || ''}">
        </div>
      </div>

      <button class="btn btn-accent mb-8" id="saveGoals">Save Goals</button>
      <button class="btn btn-ghost" id="cancelGoals">Cancel</button>
    </div>
  `);

  if (!existing.calories) {
    const sug = suggestGoals(defaultBw, goalType, pace);
    overlay.querySelector('#g_cal').value = sug.calories;
    overlay.querySelector('#g_p').value = sug.protein;
    overlay.querySelector('#g_c').value = sug.carbs;
    overlay.querySelector('#g_f').value = sug.fat;
  }

  overlay.querySelector('#g_type').addEventListener('click', e => {
    const btn = e.target.closest('button[data-type]');
    if (!btn) return;
    goalType = btn.dataset.type;
    overlay.querySelectorAll('#g_type button').forEach(b => b.classList.toggle('sel', b.dataset.type === goalType));
    if (goalType === 'gain') overlay.querySelector('#g_pace').value = 0.5;
    else if (goalType === 'cut') overlay.querySelector('#g_pace').value = -0.75;
    else overlay.querySelector('#g_pace').value = 0;
  });

  overlay.querySelector('#g_recalc').addEventListener('click', () => {
    const bw = parseFloat(overlay.querySelector('#g_bw').value) || defaultBw;
    const p = parseFloat(overlay.querySelector('#g_pace').value);
    const sug = suggestGoals(bw, goalType, isNaN(p) ? null : p);
    overlay.querySelector('#g_cal').value = sug.calories;
    overlay.querySelector('#g_p').value = sug.protein;
    overlay.querySelector('#g_c').value = sug.carbs;
    overlay.querySelector('#g_f').value = sug.fat;
  });

  overlay.querySelector('#cancelGoals').addEventListener('click', () => overlay.remove());
  overlay.querySelector('#saveGoals').addEventListener('click', () => {
    const bw = parseFloat(overlay.querySelector('#g_bw').value) || defaultBw;
    const p = parseFloat(overlay.querySelector('#g_pace').value);
    const goalLbs = parseFloat(overlay.querySelector('#g_target').value);
    Storage.setFuelGoals({
      calories: parseInt(overlay.querySelector('#g_cal').value, 10) || 0,
      protein: parseInt(overlay.querySelector('#g_p').value, 10) || 0,
      carbs: parseInt(overlay.querySelector('#g_c').value, 10) || 0,
      fat: parseInt(overlay.querySelector('#g_f').value, 10) || 0,
      bodyweight: bw,
      goalType,
      pace: isNaN(p) ? 0 : p,
      goalLbs: isNaN(goalLbs) ? null : goalLbs
    });
    overlay.remove();
    App.navigate('fuel');
  });
}

        <div class="metric"><span class="t-sm t-muted">Vitamin D</span><span class="t-sm fw-7">2,000-5,000 IU daily</span></div>
        <div class="metric"><span class="t-sm t-muted">Magnesium</span><span class="t-sm fw-7">300-400mg glycinate (bedtime)</span></div>
        <div class="metric"><span class="t-sm t-muted">Omega-3</span><span class="t-sm fw-7">2-3g EPA/DHA daily</span></div>
        <div class="metric"><span class="t-sm t-muted">Caffeine (race day)</span><span class="t-sm fw-7">200-400mg</span></div>
      </div>`;
  }
  if (tab === 'meals') {
    return `
      <div class="label">Pre-Run (60-90 min before)</div>
      <div class="card mb-16" style="padding:14px 16px">
        <div style="padding:8px 0;border-bottom:1px solid var(--border)"><div class="t-sm fw-6">Oatmeal + Banana + Honey</div><div class="t-xs t-muted mt-4">Gold standard pre-run.</div></div>
        <div style="padding:8px 0;border-bottom:1px solid var(--border)"><div class="t-sm fw-6">Toast + PB + Banana</div><div class="t-xs t-muted mt-4">Quick balanced.</div></div>
        <div style="padding:8px 0;border-bottom:1px solid var(--border)"><div class="t-sm fw-6">Rice Cakes + Honey + Salt</div><div class="t-xs t-muted mt-4">Light option.</div></div>
        <div style="padding:8px 0"><div class="t-sm fw-6">Dates + Banana (30 min before)</div><div class="t-xs t-muted mt-4">Quick top-up.</div></div>
      </div>
      <div class="label">Post-Run (within 30 min)</div>
      <div class="card mb-16" style="padding:14px 16px">
        <div style="padding:8px 0;border-bottom:1px solid var(--border)"><div class="t-sm fw-6">Smoothie: Yogurt + banana + berries + protein</div><div class="t-xs t-muted mt-4">Best option.</div></div>
        <div style="padding:8px 0"><div class="t-sm fw-6">Chocolate Milk (16 oz)</div><div class="t-xs t-muted mt-4">Legit recovery drink.</div></div>
      </div>
      <div class="label">Lunch / Dinner</div>
      <div class="card" style="padding:14px 16px">
        <div style="padding:8px 0;border-bottom:1px solid var(--border)"><div class="t-sm fw-6">Burrito Bowl</div><div class="t-xs t-muted mt-4">Rice + beans + chicken + avocado. ~900 cal.</div></div>
        <div style="padding:8px 0;border-bottom:1px solid var(--border)"><div class="t-sm fw-6">Stir Fry</div><div class="t-xs t-muted mt-4">Rice + protein + veggies. ~800 cal.</div></div>
        <div style="padding:8px 0;border-bottom:1px solid var(--border)"><div class="t-sm fw-6">Pasta + Meat Sauce</div><div class="t-xs t-muted mt-4">~850 cal.</div></div>
        <div style="padding:8px 0"><div class="t-sm fw-6">Salmon + Sweet Potato + Veggies</div><div class="t-xs t-muted mt-4">~750 cal.</div></div>
      </div>`;
  }
  if (tab === 'grocery') {
    return `
      <div class="label" style="color:var(--accent)">Carbs</div>
      <div class="card mb-16" style="padding:14px 16px"><div class="t-sm" style="line-height:2">White rice<br>Oats<br>Pasta<br>Bread<br>Bananas<br>Sweet potatoes<br>Honey<br>Tortillas</div></div>
      <div class="label" style="color:var(--accent)">Protein</div>
      <div class="card mb-16" style="padding:14px 16px"><div class="t-sm" style="line-height:2">Chicken thighs<br>Ground beef 85/15<br>Eggs<br>Greek yogurt<br>Whey protein<br>Salmon</div></div>
      <div class="label" style="color:var(--accent)">Fats + Extras</div>
      <div class="card mb-16" style="padding:14px 16px"><div class="t-sm" style="line-height:2">Peanut butter<br>Avocados<br>Olive oil<br>Cheese<br>Trail mix<br>Frozen berries<br>Vegetables</div></div>
      <div class="label" style="color:var(--accent)">Supplements</div>
      <div class="card" style="padding:14px 16px"><div class="t-sm" style="line-height:2">Electrolytes<br>Creatine monohydrate<br>Magnesium glycinate<br>Vitamin D<br>Fish oil<br>Tart cherry juice</div></div>`;
  }
  if (tab === 'raceday') {
    return `
      <div class="label">3 Days Before</div>
      <div class="card mb-16" style="padding:14px 16px"><div class="t-sm" style="line-height:1.8">Carb load: 8-10 g/kg<br>Switch to white rice, pasta, bread<br>Reduce training (taper)</div></div>
      <div class="label">Race Morning</div>
      <div class="card mb-16" style="padding:14px 16px">
        <div class="metric"><span class="t-sm t-muted">3-4 hrs before</span><span class="t-sm fw-6">Oats + banana + honey + coffee</span></div>
        <div class="metric"><span class="t-sm t-muted">90 min before</span><span class="t-sm fw-6">Banana or energy bar</span></div>
        <div class="metric"><span class="t-sm t-muted">30 min before</span><span class="t-sm fw-6">Gel + water. Caffeine 200-400mg.</span></div>
      </div>
      <div class="label">During Race</div>
      <div class="card" style="padding:14px 16px"><div class="t-sm" style="line-height:1.8">Sip sports drink at Roxzones<br>Gel at station 4 if energy dipping<br>Target: 30-60g carbs/hour</div></div>`;
  }
}


// =============================================
// APP CONTROLLER
// =============================================
const App = {
  currentView: 'today',
  selectedRPE: null,
  detailDate: null,

  init() {
    setTimeout(() => {
      const l = document.getElementById('loading');
      if (l) { l.style.opacity='0'; l.style.transition='opacity .3s'; setTimeout(()=>l.remove(),300); }
      document.getElementById('nav').style.display = 'flex';
      this.navigate('today');
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(r=>r.forEach(reg=>reg.unregister()));
        navigator.serviceWorker.register('./sw.js').catch(()=>{});
      }
    }, 400);

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => { this.detailDate = null; this.navigate(btn.dataset.view); });
    });
  },

  navigate(view) {
    this.currentView = view;
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.view === view));
    const app = document.getElementById('app');
    switch(view) {
      case 'today': app.innerHTML = renderToday(this.detailDate); break;
      case 'plan': app.innerHTML = renderCalendar(); break;
      case 'fuel': app.innerHTML = renderFuel(); break;
      case 'stats': app.innerHTML = renderStats(); requestAnimationFrame(()=>{initDashboardCharts();initRaceCharts()}); break;
    }
    if (!this.detailDate) app.scrollTop = 0;
  },

  showWorkoutForDate(d) { this.detailDate = d; this.navigate('today'); },
  prevDay(d) { const dt=new Date(d+'T00:00:00'); dt.setDate(dt.getDate()-1); this.showWorkoutForDate(dt.toISOString().split('T')[0]); },
  nextDay(d) { const dt=new Date(d+'T00:00:00'); dt.setDate(dt.getDate()+1); this.showWorkoutForDate(dt.toISOString().split('T')[0]); },

  toggleExercise(dateStr, index, el) {
    const done = Storage.toggleExercise(dateStr, index);
    const check = el.querySelector('.ex-check');
    const name = el.querySelector('.t-md');
    check.classList.toggle('done', done);
    check.querySelector('svg').style.opacity = done ? 1 : 0;
    check.querySelector('svg').setAttribute('stroke', done ? '#FFF' : '#1E1A16');
    if (name) { name.style.textDecoration = done ? 'line-through' : ''; name.style.opacity = done ? '.4' : ''; }
  },

  saveLog(dateStr, index, exName) {
    const w = document.getElementById('log-w-'+index)?.value || '';
    const r = document.getElementById('log-r-'+index)?.value || '';
    const s = document.getElementById('log-s-'+index)?.value || '';
    Storage.saveExerciseLog(dateStr, index, {weight:w, reps:r, sets:s, exerciseName: exName});
  },

  saveRunStats(dateStr) {
    Storage.saveRunStats(dateStr, {
      avgHR: document.getElementById('rs-hr')?.value || '',
      avgPace: document.getElementById('rs-pace')?.value || '',
      distance: document.getElementById('rs-dist')?.value || '',
      vo2max: document.getElementById('rs-vo2')?.value || ''
    });
  },

  selectRPE(v) {
    this.selectedRPE = v;
    document.querySelectorAll('.rpe').forEach(b => {
      b.classList.toggle('sel', parseInt(b.dataset.rpe) === v);
    });
  },

  completeWorkout(dateStr) {
    const notes = document.getElementById('workout-notes')?.value || '';
    Storage.markWorkoutComplete(dateStr, this.selectedRPE || 0, notes);
    this.selectedRPE = null;
    this.navigate('today');
  },

  calendarPrevWeek() { if(calendarCurrentWeek>1){calendarCurrentWeek--;this.navigate('plan')} },
  calendarNextWeek() { if(calendarCurrentWeek<30){calendarCurrentWeek++;this.navigate('plan')} },
  jumpToWeek(w) { calendarCurrentWeek = w; this.navigate('plan'); },
  setStatsTab(t) { statsTab=t; this.navigate('stats'); },

  openSwap(dateStr) {
    // Get the current week's 7 days (Mon-Sun starting from this week's Monday)
    const date = new Date(dateStr + 'T00:00:00');
    const day = date.getDay(); // 0=Sun, 1=Mon...
    const diff = day === 0 ? -6 : 1 - day; // shift to Monday
    const monday = new Date(date);
    monday.setDate(date.getDate() + diff);

    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      const ds = d.toISOString().split('T')[0];
      const wDate = Storage.getWorkoutDate(ds);
      let wo = null;
      for (const week of TRAINING_PLAN) {
        for (const dy of week.days) if (dy.dateStr === wDate) { wo = dy; break; }
        if (wo) break;
      }
      days.push({ dateStr: ds, dayName: d.toLocaleDateString('en-US',{weekday:'long'}), shortDate: d.toLocaleDateString('en-US',{month:'short',day:'numeric'}), workout: wo, isCurrent: ds === dateStr });
    }

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML = `<div class="modal">
      <div class="row-between mb-16">
        <div>
          <div class="t-lg fw-8">Swap Workout</div>
          <div class="t-xs t-muted mt-4">Pick a day to swap with</div>
        </div>
        <button onclick="this.closest('.modal-overlay').remove()" style="padding:4px 10px;color:var(--text2);font-size:20px">×</button>
      </div>
      ${days.map(d => `
        <div class="modal-day" ${d.isCurrent ? 'style="opacity:.4;pointer-events:none"' : `onclick="App.doSwap('${dateStr}','${d.dateStr}')"`}>
          <div>
            <div class="t-sm fw-7">${d.dayName} ${d.isCurrent ? '<span class="t-faint" style="font-weight:400">(current)</span>' : ''}</div>
            <div class="t-xs t-muted mt-4">${d.shortDate} · ${d.workout ? d.workout.title : 'No workout'}</div>
          </div>
          ${d.workout && !d.isCurrent ? `<div style="font-size:18px">${d.workout.icon}</div>` : ''}
        </div>
      `).join('')}
    </div>`;
    document.body.appendChild(overlay);
  },

  doSwap(date1, date2) {
    Storage.swapDays(date1, date2);
    document.querySelector('.modal-overlay')?.remove();
    this.navigate('today');
  }
};

document.addEventListener('DOMContentLoaded', () => App.init());

    </script>
</body>
